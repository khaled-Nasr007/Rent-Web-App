                            {/* KPI Dynamic Summary Cards Banner */}
                            <KPISummaryBanner />

                            {/* Preview Table */}
                            {processedData.length > 0 && (
                                <Card
                                    className="shadow-sm"
                                    title={
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-primary font-cairo">
                                                {reportTypes.find(r => r.key === selectedReport)?.icon} {reportTypes.find(r => r.key === selectedReport)?.title}
                                                <Tag color="blue" className="mr-3 font-cairo">{processedData.length} سجل</Tag>
                                            </span>
                                            <Button
                                                type="primary"
                                                icon={<FileTextOutlined />}
                                                onClick={exportStyledExcel}
                                                className="bg-primary font-cairo"
                                            >
                                                تصدير إلى إكسيل 📥
                                            </Button>
                                        </div>
                                    }
                                >
                                    <Table
                                        columns={previewColumns}
                                        dataSource={processedData}
                                        rowKey="key"
                                        bordered
                                        size="small"
                                        pagination={{ pageSize: 20, showSizeChanger: true, pageSizeOptions: ['10', '20', '50', '100'] }}
                                        scroll={{ x: 'max-content' }}
                                        summary={() => renderSummary()}
                                        onChange={handleTableChange}
                                        locale={{ emptyText: 'لا توجد بيانات مطابقة للفلاتر المحددة' }}
                                    />
                                </Card>
                            )}

                            {/* Empty state */}
                            {selectedReport && processedData.length === 0 && !loading && (
                                <div className="text-center py-16 text-gray-400">
                                    <div className="text-5xl mb-4">📊</div>
                                    <Title level={5} type="secondary" className="font-cairo">لا توجد بيانات مطابقة للفلاتر المحددة. اختر الفلاتر ثم اضغط "عرض التقرير" لعرض البيانات</Title>
                                </div>
                            )}
                        </div>
                    )
                }
            ];

            if (isSuperAdmin) {
                tabItems.push({
                    key: 'audit',
                    label: 'سجل العمليات والمراقبة (Audit Trail)',
                    children: <SystemLogsView profile={profile} />
                });
            }

            return (
                <div className="space-y-6">
                    <antd.Tabs defaultActiveKey="reports" items={tabItems} />
                </div>
            );
        };


        const VouchersLedger = ({ profile, cities }) => {
            const [receipts, setReceipts] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [buildings, setBuildings] = useState([]);
            const [units, setUnits] = useState([]);
            const [loading, setLoading] = useState(true);

            // Filter states
            const [selectedCity, setSelectedCity] = useState(null);
            const [selectedBuilding, setSelectedBuilding] = useState(null);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [voucherType, setVoucherType] = useState('all');
            const [searchText, setSearchText] = useState('');

            // Date filtering states
            const [calendarMode, setCalendarMode] = useState('Gregorian'); // Gregorian or Hijri
            const [gregorianRange, setGregorianRange] = useState(null);
            const [hijriYear, setHijriYear] = useState(null);
            const [hijriMonth, setHijriMonth] = useState('all');

            // Modal states for details & printing
            const [activeReceipt, setActiveReceipt] = useState(null);
            const [receiptModalVisible, setReceiptModalVisible] = useState(false);
            const [activeExpense, setActiveExpense] = useState(null);
            const [expensePreviewVisible, setExpensePreviewVisible] = useState(false);
            const [printOnLoad, setPrintOnLoad] = useState(false);

            const fetchData = useCallback(async () => {
                if (!profile) {
                    setReceipts([]);
                    setExpenses([]);
                    setBuildings([]);
                    setUnits([]);
                    setLoading(false);
                    return;
                }
                setLoading(true);
                try {
                    const assignedBIds = getAssignedBuildingIds(profile);

                    if (assignedBIds !== null && assignedBIds.length === 0) {
                        setReceipts([]);
                        setExpenses([]);
                        setBuildings([]);
                        setUnits([]);
                        setLoading(false);
                        return;
                    }

                    let receiptsQuery = supabase.from('receipts').select('*').order('created_at', { ascending: false });
                    let expensesQuery = supabase.from('vouchers_expense').select('*').order('created_at', { ascending: false });
                    let buildingsQuery = supabase.from('buildings').select('*');
                    let unitsQuery = supabase.from('units').select('*');

                    if (assignedBIds !== null) {
                        receiptsQuery = receiptsQuery.in('building_id', assignedBIds);
                        expensesQuery = expensesQuery.in('building_id', assignedBIds);
                        buildingsQuery = buildingsQuery.in('id', assignedBIds);
                        unitsQuery = unitsQuery.in('building_id', assignedBIds);
                    }

                    const [rRes, eRes, bRes, uRes] = await Promise.all([
                        receiptsQuery,
                        expensesQuery,
                        buildingsQuery,
                        unitsQuery
                    ]);
                    
                    if (rRes.error) throw rRes.error;
                    if (eRes.error) throw eRes.error;
                    if (bRes.error) throw bRes.error;
                    if (uRes.error) throw uRes.error;

                    setReceipts(rRes.data || []);
                    setExpenses(eRes.data || []);
                    setBuildings(bRes.data || []);
                    setUnits(uRes.data || []);
                } catch (err) {
                    message.error("خطأ في تحميل بيانات السندات: " + err.message);
                } finally {
                    setLoading(false);
                }
            }, [profile]);

            useEffect(() => {
                fetchData();
                const channel = supabase.channel('vouchers-ledger-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'receipts' }, fetchData)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'vouchers_expense' }, fetchData)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'buildings' }, fetchData)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'units' }, fetchData)
                    .subscribe();
                return () => {
                    channel.unsubscribe();
                };
            }, [fetchData]);

            // Automatically print once modal is rendered
            useEffect(() => {
                if (printOnLoad && (receiptModalVisible || expensePreviewVisible)) {
                    setPrintOnLoad(false);
                    setTimeout(() => {
                        window.print();
                    }, 350);
                }
            }, [printOnLoad, receiptModalVisible, expensePreviewVisible]);

            // Reset dependent cascading filters
            const handleCityChange = (val) => {
                setSelectedCity(val);
                setSelectedBuilding(null);
                setSelectedUnit(null);
            };

            const handleBuildingChange = (val) => {
                setSelectedBuilding(val);
                setSelectedUnit(null);
            };

            // Options for cascading filters
            const filteredBuildingsOptions = useMemo(() => {
                if (!selectedCity) return buildings;
                return buildings.filter(b => b.city_id === selectedCity);
            }, [buildings, selectedCity]);

            const filteredUnitsOptions = useMemo(() => {
                if (!selectedBuilding) return [];
                return units.filter(u => u.building_id === selectedBuilding);
            }, [units, selectedBuilding]);

            // Merge receipts & expenses into a unified chronological stream
            const mergedStream = useMemo(() => {
                const stream = [];

                receipts.forEach(r => {
                    const b = buildings.find(b => b.id === r.building_id);
                    const u = units.find(u => u.id === r.unit_id);
                    stream.push({
                        id: `receipt-${r.id}`,
                        date: r.created_at,
                        type: 'receipt',
                        refNumber: r.receipt_number,
                        buildingId: r.building_id,
                        buildingName: b ? b.name : (r.building_name || '-'),
                        cityId: b ? b.city_id : null,
                        unitId: r.unit_id,
                        unitNumber: u ? u.unit_number : (r.unit_number || '-'),
                        amount: r.amount_received || 0,
                        paymentMethod: r.payment_method,
                        category: 'إيراد إيجار',
                        description: `دفعة إيجار - المستأجر: ${r.tenant_name || '-'}`,
                        approvalStatus: 'approved',
                        rawItem: r
                    });
                });

                expenses.forEach(e => {
                    const b = buildings.find(b => b.id === e.building_id);
                    const u = units.find(u => u.id === e.unit_id);
                    const catAr = e.category === 'Maintenance' ? 'صيانة' : e.category === 'Utilities' ? 'خدمات' : e.category === 'General' ? 'أخرى' : e.category;
                    stream.push({
                        id: `expense-${e.id}`,
                        date: e.created_at,
                        type: 'expense',
                        refNumber: e.voucher_number,
                        buildingId: e.building_id,
                        buildingName: b ? b.name : '-',
                        cityId: b ? b.city_id : null,
                        unitId: e.unit_id,
                        unitNumber: u ? u.unit_number : 'عام للمبنى',
                        amount: e.amount || 0,
                        paymentMethod: e.payment_method,
                        category: `مصروف (${catAr})`,
                        description: e.description || '-',
                        approvalStatus: e.approval_status || 'pending',
                        rawItem: e
                    });
                });

                return stream.sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [receipts, expenses, buildings, units]);

            // Filter stream based on active selections
            const filteredStream = useMemo(() => {
                return mergedStream.filter(item => {
                    if (selectedCity && item.cityId !== selectedCity) return false;
                    if (selectedBuilding && item.buildingId !== selectedBuilding) return false;
                    if (selectedUnit && item.unitId !== selectedUnit) return false;
                    if (voucherType !== 'all' && item.type !== voucherType) return false;

                    // Date Filters
                    if (calendarMode === 'Gregorian' && gregorianRange && gregorianRange.length === 2) {
                        const start = gregorianRange[0].startOf('day');
                        const end = gregorianRange[1].endOf('day');
                        const itemDate = dayjs(item.date);
                        if (itemDate.isBefore(start) || itemDate.isAfter(end)) return false;
                    }

                    if (calendarMode === 'Hijri' && hijriYear) {
                        const { startDate, endDate } = getGregorianRangeForHijriMonth(
                            hijriYear,
                            hijriMonth === 'all' ? null : parseInt(hijriMonth, 10)
                        );
                        if (startDate && endDate) {
                            const itemDate = new Date(item.date);
                            if (itemDate < startDate || itemDate > endDate) return false;
                        }
                    }

                    // Text Search
                    if (searchText) {
                        const s = searchText.toLowerCase();
                        const refMatch = item.refNumber?.toLowerCase().includes(s);
                        const descMatch = item.description?.toLowerCase().includes(s);
                        const bMatch = item.buildingName?.toLowerCase().includes(s);
                        const uMatch = item.unitNumber?.toLowerCase().includes(s);
                        if (!refMatch && !descMatch && !bMatch && !uMatch) return false;
                    }

                    return true;
                });
            }, [mergedStream, selectedCity, selectedBuilding, selectedUnit, voucherType, calendarMode, gregorianRange, hijriYear, hijriMonth, searchText]);

            // Calculate KPI aggregates (only count approved expenses for totals)
            const kpis = useMemo(() => {
                let totalReceipts = 0;
                let totalExpenses = 0;

                filteredStream.forEach(item => {
                    if (item.type === 'receipt') {
                        totalReceipts += item.amount;
                    } else if (item.type === 'expense' && item.approvalStatus === 'approved') {
                        totalExpenses += item.amount;
                    }
                });

                return {
                    totalReceipts,
                    totalExpenses,
                    netCash: totalReceipts - totalExpenses
                };
            }, [filteredStream]);

            // Open popup detail view modal
            const handleViewRow = (item) => {
                if (item.type === 'receipt') {
                    setActiveReceipt(item.rawItem);
                    setReceiptModalVisible(true);
                } else {
                    const b = buildings.find(b => b.id === item.rawItem.building_id);
                    const u = units.find(u => u.id === item.rawItem.unit_id);
                    setActiveExpense({
                        ...item.rawItem,
                        building_name: b ? b.name : '-',
                        unit_number: u ? u.unit_number : 'عام للمبنى',
                        created_by_email: item.rawItem.created_by_email || ''
                    });
                    setExpensePreviewVisible(true);
                }
            };

            // Print voucher directly from row
            const handlePrintRow = (item, e) => {
                if (e) e.stopPropagation();
                setPrintOnLoad(true);
                handleViewRow(item);
            };

            return (
                <div className="space-y-6">
                    {/* Filter Panel Card */}
                    <Card className="shadow-sm border-gray-100" title={<div className="flex items-center gap-2 font-bold text-primary"><span>🔍</span> تصفية وبحث السندات الموحدة</div>}>
                        <div className="space-y-4">
                            {/* Row 1: City -> Building -> Unit */}
                            <Row gutter={[16, 16]}>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">المدينة (City)</div>
                                    <Select
                                        className="w-full"
                                        placeholder="كل المدن"
                                        allowClear
                                        value={selectedCity}
                                        onChange={handleCityChange}
                                        options={cities.map(c => ({ label: c.name_ar, value: c.id }))}
                                    />
                                </Col>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">العمارة (Building)</div>
                                    <Select
                                        className="w-full"
                                        placeholder="كل العمارات"
                                        allowClear
                                        value={selectedBuilding}
                                        onChange={handleBuildingChange}
                                        options={filteredBuildingsOptions.map(b => ({ label: b.name, value: b.id }))}
                                    />
                                </Col>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">الوحدة (Unit)</div>
                                    <Select
                                        className="w-full"
                                        placeholder="كل الوحدات"
                                        allowClear
                                        disabled={!selectedBuilding}
                                        value={selectedUnit}
                                        onChange={setSelectedUnit}
                                        options={filteredUnitsOptions.map(u => ({ label: `وحدة ${u.unit_number}`, value: u.id }))}
                                    />
                                </Col>
                            </Row>

                            {/* Row 2: Voucher Type, Date Calendars, Search */}
                            <Row gutter={[16, 16]}>
                                <Col xs={24} sm={6}>
                                    <div className="text-xs text-gray-500 mb-1">نوع السند (Voucher Type)</div>
                                    <Select
                                        className="w-full"
                                        value={voucherType}
                                        onChange={setVoucherType}
                                        options={[
                                            { label: 'الكل (All)', value: 'all' },
                                            { label: 'سند قبض (Receipt)', value: 'receipt' },
                                            { label: 'سند صرف (Expense)', value: 'expense' }
                                        ]}
                                    />
                                </Col>

                                <Col xs={24} sm={10}>
                                    <div className="text-xs text-gray-500 mb-1">نوع التقويم والنطاق الزمني</div>
                                    <div className="flex gap-2 items-center">
                                        <Radio.Group 
                                            value={calendarMode} 
                                            onChange={e => setCalendarMode(e.target.value)}
                                            size="middle"
                                            className="flex-shrink-0"
                                        >
                                            <Radio.Button value="Gregorian">ميلادي</Radio.Button>
                                            <Radio.Button value="Hijri">هجري</Radio.Button>
                                        </Radio.Group>
                                        {calendarMode === 'Gregorian' ? (
                                            <DatePicker.RangePicker 
                                                className="w-full"
                                                value={gregorianRange}
                                                onChange={setGregorianRange}
                                                placeholder={['من تاريخ', 'إلى تاريخ']}
                                            />
                                        ) : (
                                            <div className="flex gap-1 w-full">
                                                <Select 
                                                    className="w-1/2"
                                                    placeholder="السنة"
                                                    value={hijriYear}
                                                    onChange={setHijriYear}
                                                    allowClear
                                                    options={[1445, 1446, 1447, 1448, 1449, 1450].map(y => ({ label: `${y} هـ`, value: y }))}
                                                />
                                                <Select 
                                                    className="w-1/2"
                                                    value={hijriMonth}
                                                    onChange={setHijriMonth}
                                                    options={[
                                                        { value: 'all', label: 'كل الأشهر' },
                                                        { value: 1, label: '1 - محرم' },
                                                        { value: 2, label: '2 - صفر' },
                                                        { value: 3, label: '3 - ربيع الأول' },
                                                        { value: 4, label: '4 - ربيع الثاني' },
                                                        { value: 5, label: '5 - جمادى الأولى' },
                                                        { value: 6, label: '6 - جمادى الآخرة' },
                                                        { value: 7, label: '7 - رجب' },
                                                        { value: 8, label: '8 - شعبان' },
                                                        { value: 9, label: '9 - رمضان' },
                                                        { value: 10, label: '10 - شوال' },
                                                        { value: 11, label: '11 - ذو القعدة' },
                                                        { value: 12, label: '12 - ذو الحجة' }
                                                    ]}
                                                />
                                            </div>
                                        )}
                                    </div>
                                </Col>

                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">بحث نصي ديناميكي (البحث)</div>
                                    <Input
                                        placeholder="ابحث بالرقم، اسم المستأجر أو البيان..."
                                        value={searchText}
                                        onChange={e => setSearchText(e.target.value)}
                                        prefix={<SearchOutlined className="text-gray-400" />}
                                        allowClear
                                    />
                                </Col>
                            </Row>
                        </div>
                    </Card>

                    {/* KPI metrics bar banner */}
                    <div className="p-4 bg-slate-50 rounded-xl border border-gray-100 shadow-sm">
                        <Row gutter={[16, 16]}>
                            <Col xs={24} sm={8}>
                                <Card className="shadow-sm border-emerald-100 hover:shadow-md transition-shadow">
                                    <Statistic
                                        title="إجمالي المقبوضات (سندات القبض)"
                                        value={kpis.totalReceipts}
                                        formatter={sarFormatter}
                                        valueStyle={{ color: '#006B3F', fontWeight: 'bold' }}
                                        prefix={<ArrowDownOutlined className="text-emerald-600" />}
                                    />
                                </Card>
                            </Col>
                            <Col xs={24} sm={8}>
                                <Card className="shadow-sm border-red-100 hover:shadow-md transition-shadow">
                                    <Statistic
                                        title="إجمالي المدفوعات (سندات الصرف)"
                                        value={kpis.totalExpenses}
                                        formatter={sarFormatter}
                                        valueStyle={{ color: '#cf222e', fontWeight: 'bold' }}
                                        prefix={<ArrowUpOutlined className="text-red-600" />}
                                    />
                                </Card>
                            </Col>
                            <Col xs={24} sm={8}>
                                <Card className="shadow-sm border-amber-100 hover:shadow-md transition-shadow">
                                    <Statistic
                                        title="إجمالي الكاش المتوفر (Net Cash)"
                                        value={kpis.netCash}
                                        formatter={sarFormatter}
                                        valueStyle={{ color: kpis.netCash >= 0 ? '#b58d1b' : '#cf222e', fontWeight: 'bold' }}
                                        prefix={<WalletOutlined className="text-amber-600" />}
                                    />
                                </Card>
                            </Col>
                        </Row>
                    </div>

                    {/* Master Ledger Data Table */}
                    <Card className="shadow-sm border-gray-100" bodyStyle={{ padding: 0 }}>
                        <Table
                            dataSource={filteredStream}
                            loading={loading}
                            rowKey="id"
                            onRow={(record) => ({
                                onClick: () => handleViewRow(record),
                                className: "cursor-pointer hover:bg-slate-50 transition-colors"
                            })}
                            columns={[
                                {
                                    title: 'التاريخ (Date)',
                                    dataIndex: 'date',
                                    key: 'date',
                                    render: (date) => (
                                        <div>
                                            <div>{dayjs(date).format('YYYY-MM-DD م')}</div>
                                            <div className="text-[10px] text-gray-400 font-semibold">{toHijri(date)} هـ</div>
                                        </div>
                                    )
                                },
                                { title: 'رقم السند (Ref)', dataIndex: 'refNumber', key: 'refNumber', className: 'font-semibold' },
                                {
                                    title: 'النوع (Type)',
                                    dataIndex: 'type',
                                    key: 'type',
                                    render: (type) => (
                                        <Tag color={type === 'receipt' ? 'success' : 'error'}>
                                            {type === 'receipt' ? 'سند قبض' : 'سند صرف'}
                                        </Tag>
                                    )
                                },
                                { title: 'العقار (Building)', dataIndex: 'buildingName', key: 'buildingName' },
                                { title: 'الوحدة (Unit)', dataIndex: 'unitNumber', key: 'unitNumber' },
                                {
                                    title: 'المبلغ (Amount)',
                                    dataIndex: 'amount',
                                    key: 'amount',
                                    render: (val, record) => (
                                        <span className={`font-bold ${record.type === 'receipt' ? 'text-emerald-600' : 'text-red-600'}`}>
                                            {record.type === 'receipt' ? '+' : '-'}{sarFormatter(val)}
                                        </span>
                                    )
                                },
                                {
                                    title: 'طريقة الدفع (Payment)',
                                    dataIndex: 'paymentMethod',
                                    key: 'paymentMethod',
                                    render: (method) => method === 'Bank Transfer' ? 'تحويل بنكي' : 'كاش'
                                },
                                { title: 'البيان والتفاصيل (Details)', dataIndex: 'description', key: 'description', className: 'text-gray-500 max-w-[200px] truncate' },
                                {
                                    title: 'حالة الاعتماد (Status)',
                                    key: 'status',
                                    render: (_, record) => {
                                        if (record.type === 'receipt') {
                                            return <Tag color="green">معتمد تلقائياً</Tag>;
                                        }
                                        const status = record.approvalStatus;
                                        let color = 'gold';
                                        let text = 'قيد المراجعة';
                                        if (status === 'approved') {
                                            color = 'green';
                                            text = 'معتمد';
                                        } else if (status === 'rejected') {
                                            color = 'red';
                                            text = 'مرفوض';
                                        }
                                        return <Tag color={color}>{text}</Tag>;
                                    }
                                },
                                {
                                    title: 'إجراءات (Actions)',
                                    key: 'actions',
                                    render: (_, record) => (
                                        <Space onClick={e => e.stopPropagation()}>
                                            <Button size="small" type="link" onClick={() => handleViewRow(record)}>تصفح</Button>
                                            {(profile?.can_report || profile?.role === 'admin') && (
                                                <Button 
                                                    size="small" 
                                                    type="primary" 
                                                    ghost 
                                                    className="border-primary text-primary"
                                                    icon={<span>🖨️</span>} 
                                                    onClick={(e) => handlePrintRow(record, e)}
                                                >
                                                    طباعة
                                                </Button>
                                            )}
                                        </Space>
                                    )
                                }
                            ]}
                        />
                    </Card>

                    {/* Popups & Modals */}
                    <ReceiptModal
                        receipt={activeReceipt}
                        visible={receiptModalVisible}
                        onClose={() => { setReceiptModalVisible(false); setActiveReceipt(null); }}
                    />

                    <ExpenseVoucherModal
                        voucher={activeExpense}
                        visible={expensePreviewVisible}
                        onClose={() => { setExpensePreviewVisible(false); setActiveExpense(null); }}
                    />
                </div>
            );
        };

        // --- Component: TreasuryDashboard ---
        const TreasuryDashboard = ({ cities, profile }) => {
            const [receipts, setReceipts] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [buildings, setBuildings] = useState([]);
            const [loading, setLoading] = useState(true);

            // Filter states
            const [selectedCity, setSelectedCity] = useState(null);
            const [selectedBuilding, setSelectedBuilding] = useState(null);

            // Date filtering states
            const [calendarMode, setCalendarMode] = useState('Gregorian'); // Gregorian or Hijri
            const [gregorianRange, setGregorianRange] = useState(null);
            const [hijriYear, setHijriYear] = useState(null);
            const [hijriMonth, setHijriMonth] = useState('all');

            const fetchData = useCallback(async () => {
                if (!profile) {
                    setReceipts([]);
                    setExpenses([]);
                    setBuildings([]);
                    setLoading(false);
                    return;
                }
                setLoading(true);
                try {
                    const assignedBIds = getAssignedBuildingIds(profile);

                    if (assignedBIds !== null && assignedBIds.length === 0) {
                        setReceipts([]);
                        setExpenses([]);
                        setBuildings([]);
                        setLoading(false);
                        return;
                    }

                    let receiptsQuery = supabase.from('receipts').select('*');
                    let expensesQuery = supabase.from('vouchers_expense').select('*');
                    let buildingsQuery = supabase.from('buildings').select('*');

                    if (assignedBIds !== null) {
                        receiptsQuery = receiptsQuery.in('building_id', assignedBIds);
                        expensesQuery = expensesQuery.in('building_id', assignedBIds);
                        buildingsQuery = buildingsQuery.in('id', assignedBIds);
                    }

                    const [rRes, eRes, bRes] = await Promise.all([
                        receiptsQuery,
                        expensesQuery,
                        buildingsQuery
                    ]);
                    
                    if (rRes.error) throw rRes.error;
                    if (eRes.error) throw eRes.error;
                    if (bRes.error) throw bRes.error;

                    setReceipts(rRes.data || []);
                    setExpenses(eRes.data || []);
                    setBuildings(bRes.data || []);
                } catch (err) {
                    message.error("خطأ في تحميل بيانات الخزينة: " + err.message);
                } finally {
                    setLoading(false);
                }
            }, [profile]);

            useEffect(() => {
                fetchData();
                const channel = supabase.channel('treasury-dashboard-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'receipts' }, fetchData)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'vouchers_expense' }, fetchData)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'buildings' }, fetchData)
                    .subscribe();
                return () => {
                    channel.unsubscribe();
                };
            }, [fetchData]);

            const handleCityChange = (val) => {
                setSelectedCity(val);
                setSelectedBuilding(null);
            };

            const filteredBuildingsOptions = useMemo(() => {
                if (!selectedCity) return buildings;
                return buildings.filter(b => b.city_id === selectedCity);
            }, [buildings, selectedCity]);

            // Helper to check if a date is within Gregorian range
            const isWithinDateFilter = useCallback((dateStr) => {
                if (!dateStr) return false;
                
                if (calendarMode === 'Gregorian' && gregorianRange && gregorianRange.length === 2) {
                    const start = gregorianRange[0].startOf('day');
                    const end = gregorianRange[1].endOf('day');
                    const itemDate = dayjs(dateStr);
                    if (itemDate.isBefore(start) || itemDate.isAfter(end)) return false;
                }

                if (calendarMode === 'Hijri' && hijriYear) {
                    const { startDate, endDate } = getGregorianRangeForHijriMonth(
                        hijriYear,
                        hijriMonth === 'all' ? null : parseInt(hijriMonth, 10)
                    );
                    if (startDate && endDate) {
                        const itemDate = new Date(dateStr);
                        if (itemDate < startDate || itemDate > endDate) return false;
                    }
                }
                return true;
            }, [calendarMode, gregorianRange, hijriYear, hijriMonth]);

            // Financial Calculations
            const financialData = useMemo(() => {
                // Filter receipts first
                const filteredReceipts = receipts.filter(r => {
                    if (!isWithinDateFilter(r.created_at)) return false;
                    const b = buildings.find(building => building.id === r.building_id);
                    if (selectedCity && (!b || b.city_id !== selectedCity)) return false;
                    if (selectedBuilding && r.building_id !== selectedBuilding) return false;
                    return true;
                });

                // Filter expenses (approved only)
                const filteredExpenses = expenses.filter(e => {
                    if (e.approval_status !== 'approved') return false;
                    if (!isWithinDateFilter(e.created_at)) return false;
                    const b = buildings.find(building => building.id === e.building_id);
                    if (selectedCity && (!b || b.city_id !== selectedCity)) return false;
                    if (selectedBuilding && e.building_id !== selectedBuilding) return false;
                    return true;
                });

                // Sum global
                let globalReceiptsCash = 0;
                let globalReceiptsBank = 0;
                let globalExpensesCash = 0;
                let globalExpensesBank = 0;

                filteredReceipts.forEach(r => {
                    if (r.payment_method === 'Cash') {
                        globalReceiptsCash += r.amount_received || 0;
                    } else if (r.payment_method === 'Bank Transfer') {
                        globalReceiptsBank += r.amount_received || 0;
                    }
                });

                filteredExpenses.forEach(e => {
                    if (e.payment_method === 'Cash') {
                        globalExpensesCash += e.amount || 0;
                    } else if (e.payment_method === 'Bank Transfer') {
                        globalExpensesBank += e.amount || 0;
                    }
                });

                const globalCash = globalReceiptsCash - globalExpensesCash;
                const globalBank = globalReceiptsBank - globalExpensesBank;
                const globalTotal = globalCash + globalBank;

                // Building level boxes
                const visibleBuildings = buildings.filter(b => {
                    if (selectedCity && b.city_id !== selectedCity) return false;
                    if (selectedBuilding && b.id !== selectedBuilding) return false;
                    return true;
                });

                const buildingBoxes = visibleBuildings.map(b => {
                    const bReceipts = receipts.filter(r => r.building_id === b.id && isWithinDateFilter(r.created_at));
                    const bExpenses = expenses.filter(e => e.building_id === b.id && e.approval_status === 'approved' && isWithinDateFilter(e.created_at));

                    let bCashIn = 0;
                    let bBankIn = 0;
                    let bCashOut = 0;
                    let bBankOut = 0;

                    bReceipts.forEach(r => {
                        if (r.payment_method === 'Cash') bCashIn += r.amount_received || 0;
                        else if (r.payment_method === 'Bank Transfer') bBankIn += r.amount_received || 0;
                    });

                    bExpenses.forEach(e => {
                        if (e.payment_method === 'Cash') bCashOut += e.amount || 0;
                        else if (e.payment_method === 'Bank Transfer') bBankOut += e.amount || 0;
                    });

                    const cashBox = bCashIn - bCashOut;
                    const bankBox = bBankIn - bBankOut;
                    const totalBox = cashBox + bankBox;

                    // Overdraft status
                    let status = 'success';
                    if (cashBox < 0) {
                        status = 'error'; // Overdraft
                    } else if (cashBox < 500) {
                        status = 'warning'; // Low cash
                    }

                    return {
                        id: b.id,
                        name: b.name,
                        city: cities.find(c => c.id === b.city_id)?.name_ar || '-',
                        cashBox,
                        bankBox,
                        totalBox,
                        status
                    };
                });

                return {
                    globalCash,
                    globalBank,
                    globalTotal,
                    buildingBoxes
                };
            }, [receipts, expenses, buildings, selectedCity, selectedBuilding, calendarMode, gregorianRange, hijriYear, hijriMonth, isWithinDateFilter, cities]);

            if (loading) {
                return (
                    <div className="flex items-center justify-center h-64">
                        <Spin size="large" tip="جاري تحميل بيانات الخزينة..." />
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    {/* Header */}
                    <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div>
                            <Title level={3} className="!m-0 text-primary flex items-center gap-2">
                                <DollarOutlined /> شاشة الخزينة والصندوق (Treasury & Cash Dashboard)
                            </Title>
                            <Text type="secondary">
                                تحليلات الخزينة العامة، الأرصدة البنكية، والصناديق النقدية للعقارات في بث حي ومباشر
                            </Text>
                        </div>
                    </div>

                    {/* Filter Panel */}
                    <Card className="shadow-sm border-gray-100" title={<div className="flex items-center gap-2 font-bold text-primary"><span>🔍</span> تصفية وبحث حسابات الخزينة</div>}>
                        <div className="space-y-4">
                            <Row gutter={[16, 16]}>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">المدينة (City)</div>
                                    <Select
                                        className="w-full"
                                        placeholder="كل المدن"
                                        allowClear
                                        value={selectedCity}
                                        onChange={handleCityChange}
                                        options={cities.filter(c => !profile || profile.role === 'admin' || buildings.some(b => b.city_id === c.id)).map(c => ({ label: c.name_ar, value: c.id }))}
                                    />
                                </Col>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">العمارة (Building)</div>
                                    <Select
                                        className="w-full"
                                        placeholder="كل العمارات"
                                        allowClear
                                        value={selectedBuilding}
                                        onChange={setSelectedBuilding}
                                        options={filteredBuildingsOptions.map(b => ({ label: b.name, value: b.id }))}
                                    />
                                </Col>
                                <Col xs={24} sm={8}>
                                    <div className="text-xs text-gray-500 mb-1">نوع التقويم والنطاق الزمني</div>
                                    <div className="flex gap-2 items-center">
                                        <Radio.Group 
                                            value={calendarMode} 
                                            onChange={e => setCalendarMode(e.target.value)}
                                            size="middle"
                                            className="flex-shrink-0"
                                        >
                                            <Radio.Button value="Gregorian">ميلادي</Radio.Button>
                                            <Radio.Button value="Hijri">هجري</Radio.Button>
                                        </Radio.Group>
                                        {calendarMode === 'Gregorian' ? (
                                            <DatePicker.RangePicker 
                                                className="w-full"
                                                value={gregorianRange}
                                                onChange={setGregorianRange}
                                                placeholder={['من تاريخ', 'إلى تاريخ']}
                                            />
                                        ) : (
                                            <div className="flex gap-1 w-full">
                                                <Select 
                                                    className="w-1/2"
                                                    placeholder="السنة"
                                                    value={hijriYear}
                                                    onChange={setHijriYear}
                                                    allowClear
                                                    options={[1445, 1446, 1447, 1448, 1449, 1450].map(y => ({ label: `${y} هـ`, value: y }))}
                                                />
                                                <Select 
                                                    className="w-1/2"
                                                    value={hijriMonth}
                                                    onChange={setHijriMonth}
                                                    options={[
                                                        { value: 'all', label: 'كل الأشهر' },
                                                        { value: 1, label: '1 - محرم' },
                                                        { value: 2, label: '2 - صفر' },
                                                        { value: 3, label: '3 - ربيع الأول' },
                                                        { value: 4, label: '4 - ربيع الثاني' },
                                                        { value: 5, label: '5 - جمادى الأولى' },
                                                        { value: 6, label: '6 - جمادى الآخرة' },
                                                        { value: 7, label: '7 - رجب' },
                                                        { value: 8, label: '8 - شعبان' },
                                                        { value: 9, label: '9 - رمضان' },
                                                        { value: 10, label: '10 - شوال' },
                                                        { value: 11, label: '11 - ذو القعدة' },
                                                        { value: 12, label: '12 - ذو الحجة' }
                                                    ]}
                                                />
                                            </div>
                                        )}
                                    </div>
                                </Col>
                            </Row>
                        </div>
                    </Card>

                    {/* Section 2: Global Treasury Summary */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Total Liquid Assets */}
                        <div className={`p-6 rounded-2xl bg-white shadow-sm border-t-4 transition-all hover:shadow-md ${financialData.globalTotal >= 0 ? 'border-t-emerald-600' : 'border-t-red-600'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="text-xs font-semibold text-slate-400 mb-1">إجمالي الأموال السائلة (Total Liquid Assets)</div>
                                    <h3 className={`text-2xl font-black ${financialData.globalTotal >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                        {sarFormatter(financialData.globalTotal)}
                                    </h3>
                                </div>
                                <div className={`p-3 rounded-xl ${financialData.globalTotal >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                                    <DollarOutlined style={{ fontSize: '24px' }} />
                                </div>
                            </div>
                        </div>

                        {/* Global Bank Balance */}
                        <div className={`p-6 rounded-2xl bg-white shadow-sm border-t-4 transition-all hover:shadow-md ${financialData.globalBank >= 0 ? 'border-t-indigo-600' : 'border-t-red-600'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="text-xs font-semibold text-slate-400 mb-1">رصيد حسابات البنوك (Global Bank Balance)</div>
                                    <h3 className={`text-2xl font-black ${financialData.globalBank >= 0 ? 'text-indigo-600' : 'text-red-600'}`}>
                                        {sarFormatter(financialData.globalBank)}
                                    </h3>
                                </div>
                                <div className={`p-3 rounded-xl ${financialData.globalBank >= 0 ? 'bg-indigo-50 text-indigo-600' : 'bg-red-50 text-red-600'}`}>
                                    <BankOutlined style={{ fontSize: '24px' }} />
                                </div>
                            </div>
                        </div>

                        {/* Global Cash Box */}
                        <div className={`p-6 rounded-2xl bg-white shadow-sm border-t-4 transition-all hover:shadow-md ${financialData.globalCash >= 0 ? 'border-t-amber-600' : 'border-t-red-600'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="text-xs font-semibold text-slate-400 mb-1">إجمالي رصيد الصندوق (Global Cash Box)</div>
                                    <h3 className={`text-2xl font-black ${financialData.globalCash >= 0 ? 'text-amber-600' : 'text-red-600'}`}>
                                        {sarFormatter(financialData.globalCash)}
                                    </h3>
                                </div>
                                <div className={`p-3 rounded-xl ${financialData.globalCash >= 0 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'}`}>
                                    <WalletOutlined style={{ fontSize: '24px' }} />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Section 3: Building Cash Boxes Grid */}
                    <Card title={<div className="font-bold text-primary flex items-center gap-2"><span>🏢</span> صناديق وأرصدة العمارات (Building Cash Boxes)</div>} className="shadow-sm">
                        {financialData.buildingBoxes.length === 0 ? (
                            <Empty description="لا توجد عقارات مطابقة للبحث" />
                        ) : (
                            <Row gutter={[16, 16]}>
                                {financialData.buildingBoxes.map(box => {
                                    // Calculate cash vs bank ratio
                                    const absCash = Math.abs(box.cashBox);
                                    const absBank = Math.abs(box.bankBox);
                                    const totalAbs = absCash + absBank;
                                    const cashPercent = totalAbs > 0 ? Math.round((absCash / totalAbs) * 100) : 50;
                                    const bankPercent = totalAbs > 0 ? Math.round((absBank / totalAbs) * 100) : 50;

                                    // Overdraft visual indicators
                                    let cardStyle = "border border-slate-200 bg-white hover:border-slate-300";
                                    let badgeColor = "default";
                                    let badgeText = "مستقر";
                                    
                                    if (box.status === 'error') {
                                        cardStyle = "border-2 border-red-500 bg-red-50/10 shadow-sm relative animate-overdraft-pulse";
                                        badgeColor = "red";
                                        badgeText = "عجز / مكشوف";
                                    } else if (box.status === 'warning') {
                                        cardStyle = "border border-amber-300 bg-amber-50/10 shadow-sm";
                                        badgeColor = "warning";
                                        badgeText = "رصيد منخفض";
                                    } else {
                                        cardStyle = "border border-emerald-200 bg-emerald-50/5 hover:border-emerald-300";
                                        badgeColor = "success";
                                        badgeText = "كافٍ ومستقر";
                                    }

                                    return (
                                        <Col xs={24} sm={12} md={8} key={box.id}>
                                            <div className={`p-5 rounded-2xl transition-all duration-300 ${cardStyle}`}>
                                                <div className="flex justify-between items-start mb-3">
                                                    <div>
                                                        <h4 className="font-bold text-base text-slate-800 m-0">{box.name}</h4>
                                                        <span className="text-xs text-slate-400">{box.city}</span>
                                                    </div>
                                                    <Tag color={badgeColor} className="m-0 font-semibold">{badgeText}</Tag>
                                                </div>

                                                <div className="space-y-2 mt-4">
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="text-slate-500">المحصل بنكياً:</span>
                                                        <span className={`font-bold ${box.bankBox >= 0 ? 'text-indigo-600' : 'text-red-600'}`}>
                                                            {sarFormatter(box.bankBox)}
                                                        </span>
                                                    </div>
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="text-slate-500">الصندوق (كاش):</span>
                                                        <span className={`font-bold ${box.cashBox >= 0 ? 'text-amber-600' : 'text-red-600'}`}>
                                                            {sarFormatter(box.cashBox)}
                                                        </span>
                                                    </div>
                                                    <Divider className="my-2" />
                                                    <div className="flex justify-between items-center text-sm font-bold">
                                                        <span className="text-slate-800">صافي رصيد العقار:</span>
                                                        <span className={box.totalBox >= 0 ? 'text-emerald-600' : 'text-red-600'}>
                                                            {sarFormatter(box.totalBox)}
                                                        </span>
                                                    </div>

                                                    {/* Ratio visual indicator */}
                                                    <div className="space-y-1 mt-4">
                                                        <div className="flex justify-between text-[10px] text-gray-400 font-semibold">
                                                            <span>كاش ({cashPercent}%)</span>
                                                            <span>بنك ({bankPercent}%)</span>
                                                        </div>
                                                        <div className="w-full h-1.5 rounded-full bg-slate-100 flex overflow-hidden">
                                                            <div style={{ width: `${cashPercent}%` }} className="bg-amber-500 h-full"></div>
                                                            <div style={{ width: `${bankPercent}%` }} className="bg-indigo-500 h-full"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </Col>
                                    );
                                })}
                            </Row>
                        )}
                    </Card>
                </div>
            );
        };

        // --- App Session Context & Hook ---
        const AppSessionContext = React.createContext(null);

        const useAppSession = () => {
            const context = React.useContext(AppSessionContext);
            return context || {
                user: null,
                profile: null,
                loading: false,
                role: null,
                assigned_buildings: [],
                can_create: false,
                can_update: false,
                can_delete: false,
                can_report: false,
            };
        };

        // --- Main App ---

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [cities, setCities] = useState([]);
            const [selectedCity, setSelectedCity] = useState(null);
            const [stats, setStats] = useState({ totalBuildings: 0, totalUnits: 0, totalPaid: 0, collectionRate: 0, cityStats: [] });
            const [allUsers, setAllUsers] = useState([]);
            const [allBuildings, setAllBuildings] = useState([]);

            const sessionValue = useMemo(() => {
                if (!user || !profile) {
                    return {
                        user: null,
                        profile: null,
                        loading: loading,
                        role: null,
                        assigned_buildings: [],
                        can_create: false,
                        can_update: false,
                        can_delete: false,
                        can_report: false,
                    };
                }
                const isAdmin = profile.role === 'admin';
                return {
                    user,
                    profile,
                    loading: loading,
                    role: profile.role,
                    assigned_buildings: profile.assigned_buildings || [],
                    can_create: isAdmin || !!profile.can_add,
                    can_update: isAdmin || !!profile.can_edit,
                    can_delete: isAdmin || !!profile.can_delete,
                    can_report: isAdmin || !!profile.can_report,
                };
            }, [user, profile, loading]);

            const fetchProfile = async (u) => {
                const { data } = await supabase.from('profiles').select('*').eq('id', u.id).single();
                setProfile(data);
                return data;
            };

            const fetchInitialData = async (prof) => {
                const { data: cityData } = await supabase.from('cities').select('*').order('created_at', { ascending: true });
                // Deduplicate by name_ar — keep the first (oldest) occurrence of each city name
                const seenNames = new Set();
                const uniqueCities = (cityData || []).filter(c => {
                    if (seenNames.has(c.name_ar)) return false;
                    seenNames.add(c.name_ar);
                    return true;
                });
                setCities(uniqueCities);

                // Set Riyadh as default if available
                // Stats calculation
                const { data: bDataRaw } = await supabase.from('buildings').select('*');
                setAllBuildings(bDataRaw || []); // Store unfiltered for AdminPanel
                const { data: uDataRaw } = await supabase.from('units').select('*');

                // RBAC: Filter buildings and units by assigned_buildings
                const assignedIds = getAssignedBuildingIds(prof);
                const bData = assignedIds === null ? (bDataRaw || []) : (bDataRaw || []).filter(b => assignedIds.includes(b.id));
                const bIds = bData.map(b => b.id);
                const uData = (uDataRaw || []).filter(u => bIds.includes(u.building_id));

                const totalBuildings = bData.length;
                const totalUnits = uData.length;
                const rentedUnitsData = uData.filter(u => u.is_rented);
                const totalPaid = rentedUnitsData.reduce((acc, u) => acc + (u.amount_paid || 0), 0) || 0;
                const totalExpected = rentedUnitsData.reduce((acc, u) => acc + (u.monthly_rent || 0), 0) || 1;

                const cityStats = uniqueCities?.map(c => {
                    const cBuildings = bData.filter(b => b.city_id === c.id);
                    const cUnits = uData.filter(u => cBuildings.some(b => b.id === u.building_id));
                    const cRentedUnits = cUnits.filter(u => u.is_rented);
                    return {
                        id: c.id,
                        name: c.name_ar,
                        buildings: cBuildings.length,
                        paid: cRentedUnits.reduce((acc, u) => acc + (u.amount_paid || 0), 0),
                        expected: cRentedUnits.reduce((acc, u) => acc + (u.monthly_rent || 0), 0) || 1
                    };
                }).filter(cs => cs.buildings > 0) || [];

                const rentedUnits = rentedUnitsData.length;
                const vacantUnits = uData.filter(u => !u.is_rented).length;
                const { data: rDataRaw } = await supabase.from('receipts').select('amount_received, payment_method, building_id');
                // RBAC: Filter receipts by assigned buildings
                const rData = (rDataRaw || []).filter(r => bIds.includes(r.building_id));
                const collectedCash = rData.filter(r => r.payment_method === 'Cash').reduce((acc, r) => acc + (r.amount_received || 0), 0);
                const collectedBank = rData.filter(r => r.payment_method === 'Bank Transfer').reduce((acc, r) => acc + (r.amount_received || 0), 0);

                const buildingSummaries = bData.map(b => {
                    const bUnits = uData.filter(u => u.building_id === b.id);
                    const rentedUnits = bUnits.filter(u => u.is_rented);
                    const expected = rentedUnits.reduce((acc, u) => acc + (u.monthly_rent || 0), 0);
                    const paid = rentedUnits.reduce((acc, u) => acc + (u.amount_paid || 0), 0);
                    return {
                        id: b.id,
                        key: b.id,
                        name: b.name,
                        city: uniqueCities?.find(c => c.id === b.city_id)?.name_ar || '-',
                        unitCount: bUnits.length || b.unit_count || 0,
                        rentedCount: rentedUnits.length,
                        vacantCount: bUnits.filter(u => !u.is_rented).length,
                        expected: expected,
                        paid: paid,
                        remaining: expected - paid
                    };
                });

                setStats({
                    totalBuildings,
                    rentedUnits,
                    vacantUnits,
                    totalPaid,
                    collectedCash,
                    collectedBank,
                    collectionRate: Math.round((totalPaid / totalExpected) * 100),
                    cityStats,
                    buildingSummaries
                });

                if (prof && prof.role === 'admin') {
                    const { data: userData } = await supabase.from('profiles').select('*');
                    setAllUsers(userData || []);
                }
            };

            useEffect(() => {
                const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
                    if (session) {
                        setUser(session.user);
                        const prof = await fetchProfile(session.user);
                        if (prof) {
                            await fetchInitialData(prof);
                        }
                    } else {
                        setUser(null);
                        setProfile(null);
                        setLoading(false);
                    }
                });

                supabase.auth.getSession().then(async ({ data: { session } }) => {
                    if (session) {
                        setUser(session.user);
                        const prof = await fetchProfile(session.user);
                        if (prof) await fetchInitialData(prof);
                    }
                }).catch(err => {
                    console.error("Auth session error:", err);
                    message.error("خطأ في الاتصال بقاعدة البيانات: " + err.message);
                }).finally(() => {
                    setLoading(false);
                });

                return () => subscription.unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const channel = supabase.channel('schema-db-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'buildings' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'units' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'receipts' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'vouchers_expense' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'cities' }, () => fetchProfile(user).then(p => p && fetchInitialData(p)))
                    .subscribe();

                return () => {
                    supabase.removeChannel(channel);
                };
            }, [user]);

            const handleLogout = async () => {
                await supabase.auth.signOut();
                window.location.href = window.location.origin + window.location.pathname;
            };

            const handleUpdateUser = async (userId, updates) => {
                const { error } = await supabase.from('profiles').update(updates).eq('id', userId);
                if (error) message.error(error.message);
                else {
                    message.success("تم تحديث بيانات المستخدم");
                    const { data: userData } = await supabase.from('profiles').select('*');
                    setAllUsers(userData || []);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center saudi-gradient"><Spin size="large" tip="جاري التحميل..." /></div>;
            if (!user) return <Login onLogin={(u) => { setUser(u); fetchProfile(u).then(prof => fetchInitialData(prof)); }} />;

            return (
                <AppSessionContext.Provider value={sessionValue}>
                    <ConfigProvider direction="rtl" locale={antd.locales?.ar_EG} theme={{ token: { fontFamily: 'Cairo', colorPrimary: '#006B3F' } }}>
                        <Layout className="min-h-screen">
                            <Sider
                                breakpoint="lg"
                                collapsedWidth="0"
                                className="!bg-white shadow-lg z-10"
                            >
                                <div className="p-6 text-center border-b border-gray-100">
                                    <Avatar size={64} icon={<UserOutlined />} className="bg-primary mb-2" />
                                    <div className="font-bold text-primary truncate">{displayUsername(profile?.email)}</div>
                                    <Tag color="gold" className="mt-1">{profile?.role === 'admin' ? 'مدير نظام' : 'مدير عقارات'}</Tag>
                                </div>
                                <Menu
                                    mode="inline"
                                    selectedKeys={[activeTab]}
                                    onClick={({ key }) => {
                                        if (key === 'logout') {
                                            handleLogout();
                                        } else {
                                            setActiveTab(key);
                                        }
                                    }}
                                    className="border-none mt-4"
                                    items={[
                                        { key: 'dashboard', icon: <DashboardOutlined />, label: 'لوحة المعلومات' },
                                        { key: 'properties', icon: <BankOutlined />, label: 'إدارة العقارات' },
                                        { key: 'vouchers', icon: <WalletOutlined />, label: 'السندات' },
                                        { key: 'treasury', icon: <DollarOutlined />, label: 'الخزينة والصناديق' },
                                        (profile?.can_report || profile?.role === 'admin') ? { key: 'reports', icon: <FileTextOutlined />, label: 'التقارير' } : null,
                                        (profile?.role === 'admin' || profile?.email === SUPER_ADMIN_EMAIL) ? { key: 'admin', icon: <TeamOutlined />, label: 'إدارة النظام' } : null,
                                        { key: 'logout', icon: <LogoutOutlined />, label: 'تسجيل الخروج', danger: true }
                                    ].filter(Boolean)}
                                />
                            </Sider>
                            <Layout>
                                <Header className="bg-white px-6 flex items-center justify-between shadow-sm border-b border-gray-100">
                                    <Title level={4} className="!m-0 text-primary">بوابة تحصيل الإيجارات</Title>
                                    <Space>
                                        <Text type="secondary">{dayjs().format('DD MMMM YYYY')}</Text>
                                    </Space>
                                </Header>
                                <Content className="p-6 overflow-auto">
                                    {activeTab === 'dashboard' && <Dashboard stats={stats} />}
                                    {activeTab === 'properties' && (
                                        <BuildingManager
                                            cities={cities}
                                            profile={profile}
                                        />
                                    )}
                                    {activeTab === 'vouchers' && (
                                        <VouchersLedger
                                            cities={cities}
                                            profile={profile}
                                        />
                                    )}
                                    {activeTab === 'treasury' && (
                                        <TreasuryDashboard
                                            cities={cities}
                                            profile={profile}
                                        />
                                    )}
                                    {activeTab === 'reports' && <Reporting profile={profile} cities={cities} />}
                                    {activeTab === 'admin' && profile?.role === 'admin' && (
                                        <AdminPanel
                                            users={allUsers}
                                            onUpdateUser={handleUpdateUser}
                                            cities={cities}
                                            allBuildings={allBuildings}
                                            currentProfile={profile}
                                        />
                                    )}
                                </Content>
                                <Footer className="text-center text-gray-400 text-xs">
                                    جميع الحقوق محفوظة © {new Date().getFullYear()} بوابة تحصيل الإيجارات - المملكة العربية السعودية
                                </Footer>
                            </Layout>
                        </Layout>
                    </ConfigProvider>
                </AppSessionContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
