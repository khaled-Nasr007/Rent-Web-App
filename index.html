                                                {
                                                    title: 'إجراءات',
                                                    key: 'actions',
                                                    render: (_, record) => (
                                                        <Space>
                                                            <Button size="small" type="link" onClick={() => {
                                                                setActiveReceipt(record);
                                                                setReceiptModalVisible(true);
                                                            }}>عرض السند</Button>
                                                            {(profile?.role === 'admin' || profile?.can_edit || profile?.can_delete) && (
                                                                <>
                                                                    {(profile?.role === 'admin' || profile?.can_edit) && (
                                                                        <Button size="small" type="text" className="text-blue-500 hover:text-blue-600" onClick={() => handleEditReceiptAmount(record)}>تعديل المبلغ</Button>
                                                                    )}
                                                                    {(profile?.role === 'admin' || profile?.can_delete) && (
                                                                        <Button size="small" danger type="text" onClick={() => handleDeleteReceipt(record)}>حذف</Button>
                                                                    )}
                                                                </>
                                                            )}
                                                        </Space>
                                                    )
                                                }
                                            ]}
                                        />
                                    </Collapse.Panel>
                                )}
                            </Collapse>
                        </div>
                    </Drawer>

                    {/* Contract Renewal Modal */}
                    <Modal
                        title={`تجديد عقد الإيجار للوحدة: ${selectedUnit?.unit_number}`}
                        open={renewalModalOpen}
                        onCancel={() => setRenewalModalOpen(false)}
                        onOk={() => renewalForm.submit()}
                        width={720}
                    >
                        <Form 
                            form={renewalForm} 
                            layout="vertical" 
                            onFinish={handleRenewContract}
                            onValuesChange={(changedValues, allValues) => {
                                if (changedValues.rent_period) {
                                    const [start, end] = changedValues.rent_period || [null, null];
                                    setRenewalLiveStartDate(start ? start.toDate() : null);
                                    setRenewalLiveEndDate(end ? end.toDate() : null);
                                }
                                if (changedValues.settlement_action !== undefined) {
                                    setSettlementAction(changedValues.settlement_action);
                                }
                                if (changedValues.new_rent_value !== undefined) {
                                    setNewRentValue(changedValues.new_rent_value || 0);
                                }
                            }}
                        >
                            {(() => {
                                const oldRemaining = selectedUnit ? (selectedUnit.monthly_rent || 0) - (selectedUnit.amount_paid || 0) : 0;
                                return oldRemaining > 0 ? (
                                    <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl mb-4 text-amber-800">
                                        <div className="font-bold text-sm mb-3">
                                            تنبيه: يوجد مبلّغ متبقي غير محصل من العقد القديم بقيمة: {sarFormatter(oldRemaining)} ر.س. يرجى اختيار الإجراء المالي المناسب لإتمام التجديد.
                                        </div>
                                        <Form.Item 
                                            name="settlement_action" 
                                            label={<span className="font-semibold">الإجراء المالي للمتبقي من العقد القديم</span>} 
                                            rules={[{ required: true, message: 'يرجى اختيار الإجراء المالي للمتابعة' }]}
                                        >
                                            <Radio.Group className="flex flex-col gap-2">
                                                <Radio value="settle" className="text-xs">
                                                    <strong>تسوية المبلغ (Cash Settlement)</strong> - سداد وإغلاق المتبقي من العقد القديم كدفعة نهائية.
                                                </Radio>
                                                <Radio value="rollover" className="text-xs">
                                                    <strong>ترحيل وإضافة على العقد الجديد (Balance Rollover)</strong> - ترحيل المتبقي وإضافته لمديونية العقد الجديد.
                                                </Radio>
                                                <Radio value="waive" className="text-xs">
                                                    <strong>إعفاء وإسقاط المبلغ (Waived / Written Off)</strong> - إسقاط المتبقي وإعفاء المستأجر منه رسمياً.
                                                </Radio>
                                            </Radio.Group>
                                        </Form.Item>

                                        {/* Option A: Cash Settlement Fields */}
                                        {settlementAction === 'settle' && (
                                            <div className="mt-4 p-3 bg-white border border-gray-100 rounded-lg">
                                                <Row gutter={16}>
                                                    <Col span={12}>
                                                        <Form.Item 
                                                            name="settled_amount" 
                                                            label="المبلغ المسدد للتسوية (ر.س)" 
                                                            initialValue={oldRemaining}
                                                            rules={[
                                                                { required: true, message: 'يرجى إدخال مبلغ التسوية' },
                                                                { type: 'number', max: oldRemaining, message: `مبلغ التسوية لا يمكن أن يتجاوز المتبقي وهو ${oldRemaining} ر.س` }
                                                            ]}
                                                        >
                                                            <InputNumber className="w-full" min={0} />
                                                        </Form.Item>
                                                    </Col>
                                                    <Col span={12}>
                                                        <Form.Item 
                                                            name="settled_payment_method" 
                                                            label="طريقة دفع التسوية" 
                                                            initialValue="Cash"
                                                            rules={[{ required: true }]}
                                                        >
                                                            <Select options={[
                                                                { label: 'كاش (Cash)', value: 'Cash' },
                                                                { label: 'تحويل بنكي (Bank Transfer)', value: 'Bank Transfer' }
                                                            ]} />
                                                        </Form.Item>
                                                    </Col>
                                                </Row>
                                            </div>
                                        )}

                                        {/* Option B: Rollover Financial Card */}
                                        {settlementAction === 'rollover' && (
                                            <Card size="small" className="bg-amber-100/50 border-amber-300 mt-4">
                                                <div className="space-y-1 text-xs text-amber-900">
                                                    <div className="flex justify-between">
                                                        <span>قيمة الإيجار الأساسية للعقد الجديد:</span>
                                                        <strong>{sarFormatter(newRentValue || 0)}</strong>
                                                    </div>
                                                    <div className="flex justify-between text-red-600">
                                                        <span>المتأخرات المرحّلة من العقد القديم (+):</span>
                                                        <strong>{sarFormatter(oldRemaining)}</strong>
                                                    </div>
                                                    <Divider className="my-1 border-amber-200" />
                                                    <div className="flex justify-between text-sm font-bold text-amber-900">
                                                        <span>إجمالي القيمة المستهدفة الجديدة:</span>
                                                        <span>{sarFormatter((newRentValue || 0) + oldRemaining)}</span>
                                                    </div>
                                                </div>
                                            </Card>
                                        )}
                                    </div>
                                ) : null;
                            })()}

                            <Divider orientation="right">بيانات المستأجر</Divider>
                            <Row gutter={16}>
                                <Col span={12}>
                                    <Form.Item name="tenant_name" label="اسم المستأجر" rules={[{ required: true }]}>
                                        <Input />
                                    </Form.Item>
                                </Col>
                                <Col span={12}>
                                    <Form.Item name="id_number" label="رقم الهوية" rules={[{ required: true }]}>
                                        <Input />
                                    </Form.Item>
                                </Col>
                            </Row>
                            <Row gutter={16}>
                                <Col span={24}>
                                    <Form.Item name="phone_number" label="رقم الجوال">
                                        <Input />
                                    </Form.Item>
                                </Col>
                            </Row>

                            <Divider orientation="right">العقد الجديد والقيمة</Divider>
                            <Row gutter={16}>
                                <Col span={12}>
                                    <Form.Item name="new_contract_number" label="رقم العقد الجديد" rules={[{ required: true }]}>
                                        <Input />
                                    </Form.Item>
                                </Col>
                                <Col span={12}>
                                    <Form.Item name="new_rent_value" label="قيمة العقد الإجمالية المتوقعة" rules={[{ required: true }]}>
                                        <InputNumber className="w-full" min={0} />
                                    </Form.Item>
                                </Col>
                            </Row>
                            <Row gutter={16}>
                                <Col span={24}>
                                    <Form.Item name="rent_period" label="فترة العقد الجديد" rules={[{ required: true }]}>
                                        <DatePicker.RangePicker className="w-full" />
                                    </Form.Item>
                                    <div className="mb-4">
                                        {renewalLiveStartDate && <span className="hijri-hint block">بداية العقد الجديد بالهجري: {toHijri(renewalLiveStartDate)} هـ</span>}
                                        {renewalLiveEndDate && <span className="hijri-hint block">نهاية العقد الجديد بالهجري: {toHijri(renewalLiveEndDate)} هـ</span>}
                                    </div>
                                </Col>
                            </Row>

                            <Divider orientation="right">تحصيل الدفعة الأولى للتجديد</Divider>
                            <Row gutter={16}>
                                <Col span={12}>
                                    <Form.Item name="amount_received" label="المبلغ المستلم كدفعة أولى (ر.س)" initialValue={0}>
                                        <InputNumber className="w-full" min={0} />
                                    </Form.Item>
                                </Col>
                                <Col span={12}>
                                    <Form.Item name="payment_method" label="طريقة دفع الدفعة الأولى" initialValue="Cash" rules={[{ required: true }]}>
                                        <Select options={[
                                            { label: 'كاش (Cash)', value: 'Cash' },
                                            { label: 'تحويل بنكي (Bank Transfer)', value: 'Bank Transfer' }
                                        ]} />
                                    </Form.Item>
                                </Col>
                            </Row>
                        </Form>
                    </Modal>

                    {/* Global Receipt Modal */}
                    <ReceiptModal
                        receipt={activeReceipt}
                        visible={receiptModalVisible}
                        onClose={() => setReceiptModalVisible(false)}
                    />

                    {/* Global Expense Voucher Modal */}
                    <ExpenseVoucherModal
                        voucher={activeExpense}
                        visible={expensePreviewVisible}
                        onClose={() => setExpensePreviewVisible(false)}
                    />
                </Drawer>
            );
        };


        const AdminPanel = ({ users, onUpdateUser, cities, allBuildings, currentProfile }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedUser, setSelectedUser] = useState(null);
            const [form] = Form.useForm();

            const [localUsers, setLocalUsers] = useState(users);
            const [loadingRows, setLoadingRows] = useState({});
            const [assignModalOpen, setAssignModalOpen] = useState(false);
            const [assignRecord, setAssignRecord] = useState(null);
            const [assignSelectedIds, setAssignSelectedIds] = useState([]);

            useEffect(() => {
                setLocalUsers(users);
            }, [users]);

            useEffect(() => {
                if (assignRecord) {
                    setAssignSelectedIds(assignRecord.assigned_buildings || []);
                } else {
                    setAssignSelectedIds([]);
                }
            }, [assignRecord]);

            const logAdminActivity = async (actionType, userId, description) => {
                if (currentProfile?.email === SUPER_ADMIN_EMAIL) {
                    await logActivity(actionType, "AUTH", userId, description);
                }
            };

            const handleRoleChange = async (userId, newRole) => {
                const originalUsers = [...localUsers];
                setLocalUsers(prev => prev.map(u => u.id === userId ? { ...u, role: newRole } : u));
                setLoadingRows(prev => ({ ...prev, [userId]: true }));

                try {
                    const { error } = await supabase.from('profiles').update({ role: newRole }).eq('id', userId);
                    if (error) {
                        setLocalUsers(originalUsers);
                        message.error("خطأ في تحديث دور المستخدم: " + error.message);
                    } else {
                        message.success("تم تحديث دور المستخدم بنجاح");
                        const targetUser = originalUsers.find(u => u.id === userId);
                        const targetName = targetUser ? displayUsername(targetUser.email) : userId;
                        await logAdminActivity("UPDATE", userId, `قام المسؤول بتعديل صلاحيات المستخدم ${targetName}`);
                    }
                } catch (err) {
                    setLocalUsers(originalUsers);
                    message.error("خطأ في الاتصال: " + err.message);
                } finally {
                    setLoadingRows(prev => ({ ...prev, [userId]: false }));
                }
            };

            const handlePermissionChange = async (userId, field, checked) => {
                const originalUsers = [...localUsers];
                setLocalUsers(prev => prev.map(u => u.id === userId ? { ...u, [field]: checked } : u));
                setLoadingRows(prev => ({ ...prev, [userId]: true }));

                try {
                    const { error } = await supabase.from('profiles').update({ [field]: checked }).eq('id', userId);
                    if (error) {
                        setLocalUsers(originalUsers);
                        message.warning("خطأ في تحديث الصلاحيات: " + error.message);
                    } else {
                        const targetUser = originalUsers.find(u => u.id === userId);
                        const targetName = targetUser ? displayUsername(targetUser.email) : userId;
                        await logAdminActivity("UPDATE", userId, `قام المسؤول بتعديل صلاحيات المستخدم ${targetName}`);
                    }
                } catch (err) {
                    setLocalUsers(originalUsers);
                    message.warning("خطأ في تحديث الصلاحيات: " + err.message);
                } finally {
                    setLoadingRows(prev => ({ ...prev, [userId]: false }));
                }
            };

            const handleOpenAssignBuildings = (record) => {
                if (record.role === 'admin') return;
                setAssignRecord(record);
                setAssignSelectedIds(record.assigned_buildings || []);
                setAssignModalOpen(true);
            };

            const handleAssignBuildings = async (userId, selectedIds) => {
                const targetUser = localUsers.find(u => u.id === userId);
                const currentSelectedIds = selectedIds || (targetUser ? targetUser.assigned_buildings : []) || [];

                const originalUsers = [...localUsers];
                setLocalUsers(prev => prev.map(u => u.id === userId ? { ...u, assigned_buildings: currentSelectedIds } : u));
                setLoadingRows(prev => ({ ...prev, [userId]: true }));

                try {
                    const { error } = await supabase.from('profiles').update({ assigned_buildings: currentSelectedIds }).eq('id', userId);
                    if (error) {
                        setLocalUsers(originalUsers);
                        message.error("خطأ في تخصيص العمارات: " + error.message);
                    } else {
                        message.success("تم تحديث صلاحيات العمارات بنجاح");
                        const targetName = targetUser ? displayUsername(targetUser.email) : userId;
                        await logAdminActivity("UPDATE", userId, `قام المسؤول بتعديل صلاحيات المستخدم ${targetName}`);
                    }
                } catch (err) {
                    setLocalUsers(originalUsers);
                    message.error("خطأ في الاتصال: " + err.message);
                } finally {
                    setLoadingRows(prev => ({ ...prev, [userId]: false }));
                }
            };

            const handleSaveUser = async (values) => {
                const processedEmail = processUsername(values.email);
                if (selectedUser) {
                    // Strip out non-profile fields before sending to DB
                    const { new_password, password, email, ...profileUpdates } = values;
                    await onUpdateUser(selectedUser.id, profileUpdates);
                    setIsModalOpen(false);
                    setSelectedUser(null);
                    form.resetFields();
                    return;
                }
                
                try {
                    // Check if user already exists in profiles
                    const { data: existingUser } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('email', processedEmail)
                        .maybeSingle();

                    if (existingUser) {
                        Modal.confirm({
                            title: 'المستخدم موجود بالفعل',
                            content: 'هذا المستخدم مسجل مسبقاً. هل تريد تحديث صلاحياته بالبيانات الجديدة؟',
                            okText: 'تحديث',
                            cancelText: 'إلغاء',
                            onOk: async () => {
                                await onUpdateUser(existingUser.id, {
                                    role: values.role || 'user',
                                    can_add: values.can_add || false,
                                    can_edit: values.can_edit || false,
                                    can_delete: values.can_delete || false,
                                    can_report: values.can_report || false,
                                    assigned_buildings: values.assigned_buildings || []
                                });
                                setIsModalOpen(false);
                                form.resetFields();
                            }
                        });
                        return;
                    }

                    const tempClient = libSupabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                        auth: { persistSession: false }
                    });

                    const { data: authData, error: authError } = await tempClient.auth.signUp({
                        email: processedEmail,
                        password: values.password,
                    });

                    if (authError) throw authError;

                    if (authData.user) {
                        const { error: profileError } = await supabase
                            .from('profiles')
                            .upsert([{
                                id: authData.user.id,
                                email: processedEmail,
                                role: values.role || 'user',
                                can_add: values.can_add || false,
                                can_edit: values.can_edit || false,
                                can_delete: values.can_delete || false,
                                can_report: values.can_report || false,
                                assigned_buildings: values.assigned_buildings || []
                            }], { onConflict: 'id' });

                        if (profileError) throw profileError;

                        message.success("تم إنشاء المستخدم وتفعيل صلاحياته بنجاح.");
                        setIsModalOpen(false);
                        form.resetFields();
                    }
                } catch (error) {
                    if (error.message.includes('rate limit')) {
                        message.error({
                            content: "خطأ: تم تجاوز حد إرسال رسائل البريد الإلكتروني. يرجى تعطيل 'Confirm Email' في إعدادات Supabase (Authentication > Settings).",
                            duration: 10
                        });
                    } else {
                        message.error("خطأ في إنشاء المستخدم: " + error.message);
                    }
                }
            };
            const handleDeleteUser = async (userId) => {
                const { error } = await supabase.rpc('admin_delete_user', { target_user_id: userId });
                if (error) message.error("خطأ في الحذف: " + error.message);
                else {
                    message.success("تم حذف المستخدم بنجاح");
                    // Data will refresh via realtime subscription in App
                }
            };

            const handleUpdatePassword = async (userId, newPassword) => {
                const { error } = await supabase.rpc('admin_update_user_password', {
                    target_user_id: userId,
                    new_password: newPassword
                });
                if (error) message.error("خطأ في تحديث كلمة المرور: " + error.message);
                else message.success("تم تحديث كلمة المرور بنجاح");
            };
            const PermissionToggle = ({ field, record }) => (
                <Checkbox
                    checked={record[field]}
                    disabled={loadingRows[record.id]}
                    onChange={(e) => handlePermissionChange(record.id, field, e.target.checked)}
                />
            );

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm">
                        <Title level={4} className="!mb-0">إدارة المستخدمين والصلاحيات</Title>
                        <Button type="primary" icon={<PlusOutlined />} onClick={() => { setSelectedUser(null); form.resetFields(); setIsModalOpen(true); }}>دعوة مستخدم جديد</Button>
                    </div>

                    <Card className="shadow-sm">
                        <Table
                            dataSource={localUsers}
                            rowKey="id"
                            scroll={{ x: 800 }}
                            columns={[
                                {
                                    title: 'اسم المستخدم',
                                    dataIndex: 'email',
                                    key: 'email',
                                    fixed: 'left',
                                    render: (v, record) => (
                                        <Space>
                                            {loadingRows[record.id] && <Spin size="small" />}
                                            {displayUsername(v)}
                                        </Space>
                                    )
                                },
                                {
                                    title: 'الدور',
                                    dataIndex: 'role',
                                    key: 'role',
                                    render: (role, record) => (
                                        <Select
                                            value={role}
                                            disabled={loadingRows[record.id]}
                                            onChange={(val) => handleRoleChange(record.id, val)}
                                            options={[{ label: 'مسؤول', value: 'admin' }, { label: 'مستخدم', value: 'user' }]}
                                        />
                                    )
                                },
                                { title: 'إضافة', key: 'can_add', render: (_, r) => <PermissionToggle field="can_add" record={r} /> },
                                { title: 'تعديل', key: 'can_edit', render: (_, r) => <PermissionToggle field="can_edit" record={r} /> },
                                { title: 'حذف', key: 'can_delete', render: (_, r) => <PermissionToggle field="can_delete" record={r} /> },
                                { title: 'تقارير', key: 'can_report', render: (_, r) => <PermissionToggle field="can_report" record={r} /> },
                                {
                                    title: 'العمارات المخصصة',
                                    key: 'assigned_buildings',
                                    width: 180,
                                    render: (_, record) => {
                                        const count = (record.assigned_buildings || []).length;
                                        const isMainAdmin = record.role === 'admin';
                                        
                                        return (
                                            <Space 
                                                className={isMainAdmin ? "" : "cursor-pointer"} 
                                                onClick={() => handleOpenAssignBuildings(record)}
                                            >
                                                {isMainAdmin ? (
                                                    <Tag color="green" className="m-0">جميع العمارات</Tag>
                                                ) : (
                                                    <Tag color={count > 0 ? 'green' : 'red'} className="m-0">
                                                        {count > 0 ? `تم تخصيص ${count} عمارات` : 'لم يتم التخصيص'}
                                                    </Tag>
                                                )}
                                                {!isMainAdmin && <EditOutlined className="text-gray-400 hover:text-primary" />}
                                            </Space>
                                        );
                                    }
                                },
                                {
                                    title: 'إجراءات',
                                    key: 'actions',
                                    fixed: 'right',
                                    width: 150,
                                    render: (_, record) => (
                                        <Space>
                                            <Button
                                                icon={<EditOutlined />}
                                                size="small"
                                                style={{ color: '#006B3F', borderColor: '#006B3F' }}
                                                disabled={loadingRows[record.id]}
                                                onClick={() => handleOpenAssignBuildings(record)}
                                                title="تعديل المستخدم"
                                            />
                                            <Button
                                                icon={<LockOutlined />}
                                                size="small"
                                                disabled={loadingRows[record.id]}
                                                onClick={() => {
                                                    const newPass = prompt("أدخل كلمة المرور الجديدة للمستخدم:");
                                                    if (newPass && newPass.length >= 6) {
                                                        handleUpdatePassword(record.id, newPass);
                                                    } else if (newPass) {
                                                        message.warning("كلمة المرور يجب أن تكون 6 أحرف على الأقل");
                                                    }
                                                }}
                                                title="تغيير كلمة المرور"
                                            />
                                            <Popconfirm
                                                title="حذف المستخدم؟"
                                                description="لا يمكن التراجع عن هذا الإجراء."
                                                disabled={loadingRows[record.id]}
                                                onConfirm={() => handleDeleteUser(record.id)}
                                                okText="نعم"
                                                cancelText="لا"
                                                okButtonProps={{ danger: true }}
                                            >
                                                <Button
                                                    danger
                                                    icon={<DeleteOutlined />}
                                                    size="small"
                                                    disabled={loadingRows[record.id]}
                                                    title="حذف المستخدم"
                                                />
                                            </Popconfirm>
                                        </Space>
                                    )
                                }
                            ]}
                        />
                    </Card>

                    <Modal
                        title={selectedUser ? "تعديل بيانات المستخدم" : "دعوة مستخدم جديد"}
                        open={isModalOpen}
                        onCancel={() => { setIsModalOpen(false); setSelectedUser(null); }}
                        onOk={() => form.submit()}
                        okText={selectedUser ? "حفظ التغييرات" : "إرسال الدعوة"}
                        cancelText="إلغاء"
                    >
                        <Form form={form} layout="vertical" onFinish={async (values) => {
                            if (selectedUser) {
                                // If password provided, update it first
                                if (values.new_password) {
                                    await handleUpdatePassword(selectedUser.id, values.new_password);
                                }
                                // Update profile data
                                await handleSaveUser(values);
                            } else {
                                await handleSaveUser(values);
                            }
                        }}>
                            <Form.Item name="email" label="اسم المستخدم" rules={[{ required: true }]}>
                                <Input placeholder="مثال: khaled" disabled={!!selectedUser} />

                try {
                    const headers = ['تاريخ العملية', 'المستخدم', 'نوع العملية', 'القسم/الجدول', 'معرف السجل', 'التفاصيل'];
                    const rows = filteredLogs.map(l => [

                    let csvContent = "\ufeff"; // BOM for UTF-8 Excel support
                    csvContent += headers.join(",") + "\n";
                    rows.forEach(row => {
                        const escapedRow = row.map(val => {
                            let cleanVal = String(val).replace(/"/g, '""');
                            if (cleanVal.includes(',') || cleanVal.includes('\n') || cleanVal.includes('"')) {
                                cleanVal = `"${cleanVal}"`;

                }
                if (calendarMode === 'Hijri' && hijriYear) {

                    if (startDate && endDate) {

                    return {
                        key: idx,
                        _date: new Date(e.created_at),
                        التاريخ: dayjs(e.created_at).format('YYYY-MM-DD'),
                        'التاريخ_هجري': toHijri(e.created_at),
                        'رقم سند الصرف': e.voucher_number,
                        العقار: b?.name || '-',
                        الوحدة: u?.unit_number || 'عام للمبنى',
                        التصنيف: translateCategory(e.category),
                        المبلغ: e.amount || 0,
                        'طريقة الدفع': e.payment_method === 'Bank Transfer' ? 'تحويل بنكي' : 'كاش',
                        البيان: e.description || '-',
                        'المعتمد بواسطة': e.approved_by || '-',
                        'حالة الاعتماد': statusText,
                        _approvalStatus: e.approval_status
                    };
                });

                setRawReportData(rows);
            };

            // ========== REPORT 5: تقرير تواريخ انتهاء العقود ==========
            const fetchLeaseExpirationReport = async () => {
                const bIds = getScopedBuildingIds();
                if (bIds.length === 0) { setRawReportData([]); return; }

                const { data: archiveData } = await supabase.from('expired_contracts_archive').select('*').in('building_id', bIds).order('archived_at', { ascending: false });

                const scopedUnits = units.filter(u => bIds.includes(u.building_id) && u.is_rented);
                const today = dayjs();

                const activeRows = scopedUnits.map(u => {
                    const b = buildings.find(bld => bld.id === u.building_id);
                    const endDate = u.period_end ? dayjs(u.period_end) : null;
                    const isExpired = endDate ? endDate.isBefore(today) : false;
                    const daysLeft = endDate ? endDate.diff(today, 'day') : null;

                    const unitArchive = (archiveData || []).find(a => String(a.unit_id) === String(u.id));
                    const isRolledOver = unitArchive && unitArchive.settlement_status === 'Rolled_Over';
                    const carriedDebt = isRolledOver ? (unitArchive.final_carried_debt_amount || 0) : 0;
                    const baseRent = (u.monthly_rent || 0) - carriedDebt;
                    const combinedTotal = u.monthly_rent || 0;

                    return {
                        العقار: b?.name || '-',
                        'رقم الوحدة': u.unit_number,
                        المستأجر: u.tenant_name || '-',
                        _startDate: u.period_start ? new Date(u.period_start) : new Date(0),
                        _endDate: u.period_end ? new Date(u.period_end) : new Date(0),
                        'بداية العقد': u.period_start || '-',
                        'نهاية العقد': u.period_end || '-',
                        الحالة: isExpired ? 'منتهي' : 'ساري',
                        'الأيام المتبقية': daysLeft !== null ? (isExpired ? `منتهي منذ ${Math.abs(daysLeft)} يوم` : `${daysLeft} يوم`) : '-',
                        'قيمة الإيجار': u.monthly_rent || 0,
                        المتبقي: (u.monthly_rent || 0) - (u.amount_paid || 0),
                        'المبالغ المرحّلة': carriedDebt,
                        'طريقة التسوية': isExpired ? 'Pending' : null,
                        'قيمة العقد الجديد الأساسية': baseRent,
                        'قيمة المبالغ المرحلة': carriedDebt,
                        'إجمالي المطلوب المحقق': combinedTotal,
                        _isExpired: isExpired,
                        _source: 'active'
                    };
                });

                const archivedRows = (archiveData || []).map(a => {
                    const b = buildings.find(bld => bld.id === a.building_id);
                    
                    const olderArchives = (archiveData || []).filter(x => 
                        String(x.unit_id) === String(a.unit_id) && 
                        new Date(x.archived_at) < new Date(a.archived_at)
                    );
                    const prevArchive = olderArchives[0];
                    const isRolledOver = prevArchive && prevArchive.settlement_status === 'Rolled_Over';
                    const carriedDebt = isRolledOver ? (prevArchive.final_carried_debt_amount || 0) : 0;
                    const baseRent = (a.monthly_rent || 0) - carriedDebt;
                    const combinedTotal = a.monthly_rent || 0;

                    return {
                        العقار: b?.name || '-',
                        'رقم الوحدة': a.unit_id ? (units.find(u => u.id === a.unit_id)?.unit_number || '-') : '-',
                        المستأجر: a.tenant_name || '-',
                        _startDate: a.period_start ? new Date(a.period_start) : new Date(0),
                        _endDate: a.period_end ? new Date(a.period_end) : new Date(0),
                        'بداية العقد': a.period_start || '-',
                        'نهاية العقد': a.period_end || '-',
                        الحالة: 'أرشيف',
                        'الأيام المتبقية': '-',
                        'قيمة الإيجار': a.monthly_rent || 0,
                        المتبقي: (a.monthly_rent || 0) - (a.amount_paid || 0),
                        'المبالغ المرحّلة': a.final_carried_debt_amount || 0,
                        'طريقة التسوية': a.settlement_status || null,
                        'قيمة العقد الجديد الأساسية': baseRent,
                        'قيمة المبالغ المرحلة': a.final_carried_debt_amount || 0,
                        'إجمالي المطلوب المحقق': combinedTotal,
                        _isExpired: true,
                        _source: 'archive'
                    };
                });

                const allRows = [...activeRows, ...archivedRows].map((r, idx) => ({ ...r, key: idx }));

                setRawReportData(allRows);
            };

            // Report type definitions
            const reportTypes = [
                { key: 'financial', title: 'كشف الحساب المالي الشامل', icon: '💰', desc: 'سجل زمني لجميع سندات القبض والصرف مع الرصيد التراكمي', color: '#006B3F', fetcher: fetchFinancialStatement },
                { key: 'occupancy', title: 'تقرير نسب الإشغال والشاغر', icon: '🏢', desc: 'تفصيل لكل عقار: الوحدات المؤجرة والشاغرة ونسب الإشغال', color: '#2563eb', fetcher: fetchOccupancyReport },
                { key: 'collection', title: 'تقرير تحصيل الإيجارات والمتأخرات', icon: '📊', desc: 'قيم العقود مقابل المحصّل والمتبقي حسب المستأجر والوحدة', color: '#D4AF37', fetcher: fetchCollectionReport },
                { key: 'expenses', title: 'تقرير مصاريف الصيانة والتشغيل', icon: '🔧', desc: 'تصنيف مفصّل للمصروفات مع هوية المعتمِد وحالة الاعتماد', color: '#dc2626', fetcher: fetchExpensesReport },
                { key: 'leases', title: 'تقرير تواريخ انتهاء العقود', icon: '📅', desc: 'العقود المنتهية والقادمة مع المبالغ المرحّلة', color: '#7c3aed', fetcher: fetchLeaseExpirationReport }
            ];

            const handleGenerateReport = async () => {
                if (!selectedReport) { message.warning('يرجى اختيار نوع التقرير أولاً'); return; }
                setLoading(true);
                setRawReportData([]);
                setSortParams({ field: null, order: null });
                try {
                    const report = reportTypes.find(r => r.key === selectedReport);
                    await report.fetcher();
                    message.success('تم تحميل بيانات التقرير بنجاح');
                } catch (err) {
                    message.error('خطأ في تحميل التقرير: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- Advanced Filtering and Sorting Engine ---

            const maxAmountInDataset = useMemo(() => {
                if (rawReportData.length === 0) return 100000;
                const maxVal = Math.max(...rawReportData.map(r => {
                    const amt = r['المبلغ'] || r['قيمة العقد'] || r['قيمة الإيجار'] || 0;
                    return amt;
                }));
                return maxVal > 0 ? maxVal : 100000;
            }, [rawReportData]);

            // Sync range slider max when dataset updates
            useEffect(() => {
                setFilterAmountRange([0, maxAmountInDataset]);
            }, [maxAmountInDataset]);

            const matchSearch = (row, searchText) => {
                if (!searchText) return true;
                const cleanSearch = searchText.trim().toLowerCase();
                return Object.keys(row).some(key => {
                    if (key.startsWith('_') || key === 'key') return false;
                    const val = row[key];
                    if (val === undefined || val === null) return false;
                    return String(val).toLowerCase().includes(cleanSearch);
                });
            };

            const matchPayment = (row, paymentMethods) => {
                if (!paymentMethods || paymentMethods.length === 0) return true;
                const rowPayment = row['طريقة الدفع'];
                if (!rowPayment) return true; 
                return paymentMethods.some(method => {
                    if (method === 'Cash') return rowPayment === 'كاش' || rowPayment === 'نقدي' || rowPayment === 'نقدي / كاش';
                    if (method === 'Bank Transfer') return rowPayment === 'تحويل بنكي';
                    return false;
                });
            };

            const matchDirection = (row, directions) => {
                if (!directions || directions.length === 0) return true;
                const rowType = row['النوع'] || row['type'];
                if (!rowType) return true; 
                return directions.some(dir => {
                    if (dir === 'Receipt') return rowType === 'سند قبض';
                    if (dir === 'Expense') return rowType === 'سند صرف';
                    return false;
                });
            };

            const matchAmount = (row, range, reportType) => {
                if (!range || range.length !== 2) return true;
                let amt = 0;
                if (reportType === 'financial' || reportType === 'expenses') {
                    amt = row['المبلغ'] || 0;
                } else if (reportType === 'collection') {
                    amt = row['قيمة العقد'] || 0;
                } else if (reportType === 'leases') {
                    amt = row['قيمة الإيجار'] || 0;
                } else {
                    return true; 
                }
                return amt >= range[0] && amt <= range[1];
            };

            const matchResolution = (row, resolutions, reportType) => {
                if (reportType !== 'leases') return true;
                if (!resolutions || resolutions.length === 0) return true;
                const rowResolution = row['طريقة التسوية'];
                return resolutions.includes(rowResolution);
            };

            // Main filtered and sorted reactive dataset
            const processedData = useMemo(() => {
                let result = rawReportData.filter(row => {
                    if (!matchSearch(row, filterSearchText)) return false;
                    if (!matchPayment(row, filterPaymentMethods)) return false;
                    if (!matchDirection(row, filterDirections)) return false;
                    if (!matchResolution(row, filterResolutions, selectedReport)) return false;
                    if (!matchAmount(row, filterAmountRange, selectedReport)) return false;
                    return true;
                });

                if (sortParams.field && sortParams.order) {
                    const isAsc = sortParams.order === 'ascend';
                    const field = sortParams.field;
                    
                    result.sort((a, b) => {
                        let valA = a[field];
                        let valB = b[field];

                        if (valA === undefined || valA === null) valA = '';
                        if (valB === undefined || valB === null) valB = '';

                        if (field === 'التاريخ' || field === 'بداية العقد' || field === 'نهاية العقد') {
                            const dateA = a._date || a._startDate || a._endDate || new Date(valA);
                            const dateB = b._date || b._startDate || b._endDate || new Date(valB);
                            return isAsc ? (dateA - dateB) : (dateB - dateA);
                        }

                        if (typeof valA === 'number' && typeof valB === 'number') {
                            return isAsc ? (valA - valB) : (valB - valA);
                        }

                        const strA = String(valA);
                        const strB = String(valB);
                        return isAsc 
                            ? strA.localeCompare(strB, 'ar', { numeric: true }) 
                            : strB.localeCompare(strA, 'ar', { numeric: true });
                    });
                }

                return result.map((item, idx) => ({ ...item, key: idx }));
            }, [rawReportData, filterSearchText, filterPaymentMethods, filterDirections, filterResolutions, filterAmountRange, sortParams, selectedReport]);

            // Dynamic KPI calculation
            const summaryData = useMemo(() => {
                if (processedData.length === 0) return null;
                if (selectedReport === 'financial') {
                    const totalReceipts = processedData.filter(r => r.النوع === 'سند قبض').reduce((s, r) => s + r.المبلغ, 0);
                    const totalExpenses = processedData.filter(r => r.النوع === 'سند صرف').reduce((s, r) => s + r.المبلغ, 0);
                    return { totalReceipts, totalExpenses, netBalance: totalReceipts - totalExpenses, count: processedData.length };
                }
                if (selectedReport === 'occupancy') {
                    const totalUnits = processedData.reduce((s, r) => s + r['إجمالي الوحدات'], 0);
                    const totalRented = processedData.reduce((s, r) => s + r['وحدات مؤجرة'], 0);
                    const totalVacant = processedData.reduce((s, r) => s + r['وحدات شاغرة'], 0);
                    const avgOccupancy = totalUnits > 0 ? Math.round((totalRented / totalUnits) * 100) : 0;
                    return { totalUnits, totalRented, totalVacant, avgOccupancy, count: processedData.length };
                }
                if (selectedReport === 'collection') {
                    const totalContract = processedData.reduce((s, r) => s + r['قيمة العقد'], 0);
                    const totalCollected = processedData.reduce((s, r) => s + r['المحصّل'], 0);
                    const totalRemaining = processedData.reduce((s, r) => s + r.المتبقي, 0);
                    return { totalContract, totalCollected, totalRemaining, count: processedData.length };
                }
                if (selectedReport === 'expenses') {
                    const totalAmount = processedData.reduce((s, r) => s + (r.المبلغ || 0), 0);
                    const approvedTotal = processedData.filter(r => r._approvalStatus === 'approved').reduce((s, r) => s + (r.المبلغ || 0), 0);
                    const maintenanceTotal = processedData.filter(r => r.التصنيف === 'صيانة').reduce((s, r) => s + (r.المبلغ || 0), 0);
                    const utilitiesTotal = processedData.filter(r => r.التصنيف === 'خدمات').reduce((s, r) => s + (r.المبلغ || 0), 0);
                    return { totalAmount, approvedTotal, maintenanceTotal, utilitiesTotal, count: processedData.length };
                }
                if (selectedReport === 'leases') {
                    const activeExpired = processedData.filter(r => r._source === 'active' && r._isExpired).length;
                    const activeSafe = processedData.filter(r => r._source === 'active' && !r._isExpired).length;
                    const archivedCount = processedData.filter(r => r._source === 'archive').length;
                    const totalCarriedDebt = processedData.reduce((s, r) => s + (r['المبالغ المرحّلة'] || 0), 0);
                    return { activeSafe, activeExpired, archivedCount, totalCarriedDebt, count: processedData.length };
                }
                return null;
            }, [processedData, selectedReport]);

            // Reactive Table Columns configuration
            const previewColumns = useMemo(() => {
                if (!selectedReport) return [];

                const getSortOrder = (colKey) => {
                    return sortParams.field === colKey ? sortParams.order : null;
                };

                if (selectedReport === 'financial') {
                    return [
                        { title: '#', render: (_, __, idx) => idx + 1, width: 50 },
                        { title: 'التاريخ', dataIndex: 'التاريخ', key: 'date', sorter: true, sortOrder: getSortOrder('التاريخ') },
                        { title: 'التاريخ الهجري', dataIndex: 'التاريخ_هجري', key: 'hijri' },
                        { title: 'رقم السند', dataIndex: 'رقم السند', key: 'ref', sorter: true, sortOrder: getSortOrder('رقم السند') },
                        { title: 'النوع', dataIndex: 'النوع', key: 'type', render: (v) => <Tag color={v === 'سند قبض' ? 'success' : 'error'}>{v}</Tag> },
                        { title: 'العقار', dataIndex: 'العقار', key: 'building', sorter: true, sortOrder: getSortOrder('العقار') },
                        { title: 'الوحدة', dataIndex: 'الوحدة', key: 'unit' },
                        { title: 'المبلغ (ر.س)', dataIndex: 'المبلغ', key: 'amount', sorter: true, sortOrder: getSortOrder('المبلغ'), render: (v, r) => <span className={r.النوع === 'سند قبض' ? 'text-emerald-600 font-bold' : 'text-red-600 font-bold'}>{r.النوع === 'سند قبض' ? '+' : '-'}{sarFormatter(v)}</span> },
                        { title: 'طريقة الدفع', dataIndex: 'طريقة الدفع', key: 'payment' },
                        { title: 'البيان', dataIndex: 'البيان', key: 'desc', className: 'max-w-[200px] truncate' },
                        { title: 'الرصيد التراكمي (ر.س)', dataIndex: 'الرصيد التراكمي', key: 'balance', sorter: true, sortOrder: getSortOrder('الرصيد التراكمي'), render: (v) => <span className={`font-bold ${v >= 0 ? 'text-emerald-700' : 'text-red-700'}`}>{sarFormatter(v)}</span> }
                    ];
                }
                if (selectedReport === 'occupancy') {
                    return [
                        { title: '#', render: (_, __, idx) => idx + 1, width: 50 },
                        { title: 'المدينة', dataIndex: 'المدينة', key: 'city' },
                        { title: 'العقار', dataIndex: 'العقار', key: 'building', sorter: true, sortOrder: getSortOrder('العقار') },
                        { title: 'إجمالي الوحدات', dataIndex: 'إجمالي الوحدات', key: 'total' },
                        { title: 'وحدات مؤجرة', dataIndex: 'وحدات مؤجرة', key: 'rented', render: (v) => <span className="text-emerald-600 font-semibold">{v}</span> },
                        { title: 'وحدات شاغرة', dataIndex: 'وحدات شاغرة', key: 'vacant', render: (v) => <span className={`font-semibold ${v > 0 ? 'text-amber-600' : 'text-gray-400'}`}>{v}</span> },
                        { title: 'نسبة الإشغال %', dataIndex: 'نسبة الإشغال %', key: 'occ', render: (v) => <antd.Progress percent={v} size="small" strokeColor={v >= 80 ? '#006B3F' : v >= 50 ? '#D4AF37' : '#ef4444'} /> }
                    ];
                }
                if (selectedReport === 'collection') {
                    return [
                        { title: '#', render: (_, __, idx) => idx + 1, width: 50 },
                        { title: 'العقار', dataIndex: 'العقار', key: 'building', sorter: true, sortOrder: getSortOrder('العقار') },
                        { title: 'رقم الوحدة', dataIndex: 'رقم الوحدة', key: 'unit' },
                        { title: 'المستأجر', dataIndex: 'المستأجر', key: 'tenant', sorter: true, sortOrder: getSortOrder('المستأجر') },
                        { title: 'رقم الهوية', dataIndex: 'رقم الهوية', key: 'id' },
                        { title: 'رقم العقد', dataIndex: 'رقم العقد', key: 'contract' },
                        { title: 'قيمة العقد (ر.س)', dataIndex: 'قيمة العقد', key: 'value', sorter: true, sortOrder: getSortOrder('قيمة العقد'), render: (v) => <span className="font-semibold">{sarFormatter(v)}</span> },
                        { title: 'المحصّل (ر.س)', dataIndex: 'المحصّل', key: 'collected', sorter: true, sortOrder: getSortOrder('المحصّل'), render: (v) => <span className="text-emerald-600 font-semibold">{sarFormatter(v)}</span> },
                        { title: 'المتبقي (ر.س)', dataIndex: 'المتبقي', key: 'remaining', sorter: true, sortOrder: getSortOrder('المتبقي'), render: (v) => <span className={`font-bold ${v > 0 ? 'text-red-600' : 'text-emerald-600'}`}>{sarFormatter(v)}</span> },
                        { title: 'طريقة الدفع', dataIndex: 'طريقة الدفع', key: 'payment' },
                        { title: 'حالة التحصيل', dataIndex: 'حالة التحصيل', key: 'status', render: (v) => <Tag color={v === 'مكتمل' ? 'success' : v === 'جزئي' ? 'warning' : 'error'}>{v}</Tag> }
                    ];
                }
                if (selectedReport === 'expenses') {
                    return [
                        { title: '#', render: (_, __, idx) => idx + 1, width: 50 },
                        { title: 'التاريخ', dataIndex: 'التاريخ', key: 'date', sorter: true, sortOrder: getSortOrder('التاريخ') },
                        { title: 'التاريخ الهجري', dataIndex: 'التاريخ_هجري', key: 'hijri' },
                        { title: 'رقم سند الصرف', dataIndex: 'رقم سند الصرف', key: 'ref', sorter: true, sortOrder: getSortOrder('رقم سند الصرف') },
                        { title: 'العقار', dataIndex: 'العقار', key: 'building', sorter: true, sortOrder: getSortOrder('العقار') },
                        { title: 'الوحدة', dataIndex: 'الوحدة', key: 'unit' },
                        { title: 'التصنيف', dataIndex: 'التصنيف', key: 'cat', render: (v) => <Tag color={v === 'صيانة' ? 'orange' : v === 'خدمات' ? 'blue' : 'default'}>{v}</Tag> },
                        { title: 'المبلغ (ر.س)', dataIndex: 'المبلغ', key: 'amount', sorter: true, sortOrder: getSortOrder('المبلغ'), render: (v) => <span className="text-red-600 font-bold">{sarFormatter(v)}</span> },
                        { title: 'طريقة الدفع', dataIndex: 'طريقة الدفع', key: 'payment' },
                        { title: 'البيان', dataIndex: 'البيان', key: 'desc', className: 'max-w-[180px] truncate' },
                        { title: 'المعتمد بواسطة', dataIndex: 'المعتمد بواسطة', key: 'approver' },
                        { title: 'حالة الاعتماد', dataIndex: 'حالة الاعتماد', key: 'status', render: (v) => <Tag color={v === 'معتمد' ? 'green' : v === 'مرفوض' ? 'red' : 'gold'}>{v}</Tag> }
                    ];
                }
                if (selectedReport === 'leases') {
                    return [
                        { title: '#', render: (_, __, idx) => idx + 1, width: 50 },
                        { title: 'العقار', dataIndex: 'العقار', key: 'building', sorter: true, sortOrder: getSortOrder('العقار') },
                        { title: 'رقم الوحدة', dataIndex: 'رقم الوحدة', key: 'unit' },
                        { title: 'المستأجر', dataIndex: 'المستأجر', key: 'tenant', sorter: true, sortOrder: getSortOrder('المستأجر') },
                        { title: 'بداية العقد', dataIndex: 'بداية العقد', key: 'start', sorter: true, sortOrder: getSortOrder('بداية العقد') },
                        { title: 'نهاية العقد', dataIndex: 'نهاية العقد', key: 'end', sorter: true, sortOrder: getSortOrder('نهاية العقد') },
                        { title: 'الحالة', dataIndex: 'الحالة', key: 'status', render: (v) => <Tag color={v === 'ساري' ? 'green' : v === 'منتهي' ? 'red' : 'default'}>{v}</Tag> },
                        { title: 'الأيام المتبقية', dataIndex: 'الأيام المتبقية', key: 'days', render: (v, r) => <span className={r._isExpired ? 'text-red-600 font-semibold' : 'text-emerald-600'}>{v}</span> },
                        { title: 'قيمة العقد الجديد الأساسية (ر.س)', dataIndex: 'قيمة العقد الجديد الأساسية', key: 'base_rent', render: (v) => sarFormatter(v) },
                        { title: 'إجمالي المطلوب المحقق (ر.س)', dataIndex: 'إجمالي المطلوب المحقق', key: 'combined_total', render: (v) => <span className="font-bold">{sarFormatter(v)}</span> },
                        { title: 'المتبقي (ر.س)', dataIndex: 'المتبقي', key: 'remaining', sorter: true, sortOrder: getSortOrder('المتبقي'), render: (v) => <span className={v > 0 ? 'text-red-600 font-bold' : ''}>{sarFormatter(v)}</span> },
                        { title: 'طريقة التسوية', dataIndex: 'طريقة التسوية', key: 'settlement', render: (v, r) => {
                            const remaining = r['المتبقي'] || 0;
                            if (remaining <= 0 && r['الحالة'] === 'ساري') return '-';
                            if (v === 'Settled') return <Tag color="success">تمت التسوية نقدياً</Tag>;

                                                                <Select value={hijriYear} onChange={setHijriYear} placeholder="السنة" className="w-full">
                                                                    {[1445, 1446, 1447, 1448, 1449, 1450].map(y => <Select.Option key={y} value={y}>{y} هـ</Select.Option>)}

                                                                        { val: 4, label: 'ربيع الثاني' }, { val: 5, label: 'جمادى الأولى' }, { val: 6, label: 'جمادى الآخرة' },
                                                                        { val: 7, label: 'رجب' }, { val: 8, label: 'شعبان' }, { val: 9, label: 'رمضان' },
                                                                        { val: 10, label: 'شوال' }, { val: 11, label: 'ذو القعدة' }, { val: 12, label: 'ذو الحجة' }

                                                {/* Second Row: Specific selectors & sliders */}
                                                <Row gutter={[16, 16]} className="items-center">
                                                    {/* Alphanumeric text search */}
                                                    <Col xs={24} md={6}>

                                                            className="font-cairo"
                                                        />
                                                    </Col>

                                                    {/* Monetary Range Slider */}
                                                    {selectedReport !== 'occupancy' && (
                                                        <Col xs={24} md={8}>

                                                                <Text type="secondary" className="font-cairo">تصفية حسب القيمة</Text>

                                                            <antd.Slider

                                                                        const label = dir === 'Receipt' ? 'سند قبض' : 'سند صرف';
                                                                        const active = filterDirections.includes(dir);
                                                                        return (
                                                                            <antd.Tag.CheckableTag
                                                                                key={dir}

                                                                                onChange={(checked) => {
                                                                                    setFilterDirections(checked ? [...filterDirections, dir] : filterDirections.filter(d => d !== dir));

                                                                            >

                                                                            </antd.Tag.CheckableTag>

                                                            {/* Payment methods - for Financial, Collection, Expenses */}
                                                            {['financial', 'collection', 'expenses'].includes(selectedReport) && (
                                                                <div className="flex items-center gap-2">
                                                                    <Text type="secondary" className="text-xs font-cairo">الدفع:</Text>
                                                                    {['Cash', 'Bank Transfer'].map(method => {
                                                                        const label = method === 'Cash' ? 'نقدي' : 'تحويل بنكي';
                                                                        const active = filterPaymentMethods.includes(method);
                                                                        return (
                                                                            <antd.Tag.CheckableTag
                                                                                key={method}
                                                                                checked={active}
                                                                                onChange={(checked) => {
                                                                                    setFilterPaymentMethods(checked ? [...filterPaymentMethods, method] : filterPaymentMethods.filter(m => m !== method));
                                                                                }}
                                                                                className={`px-3 py-1 text-xs border rounded-full transition-all duration-300 font-cairo ${active ? 'bg-amber-600 text-white border-amber-600 shadow-sm' : 'bg-gray-50 border-gray-200'}`}
                                                                            >
                                                                                {label}
                                                                            </antd.Tag.CheckableTag>
                                                                        );
                                                                    })}
                                                                </div>
                                                            )}

                                                            {/* Resolution filter tags - for leases only */}
                                                            {selectedReport === 'leases' && (
                                                                <div className="flex items-center gap-2">
                                                                    <Text type="secondary" className="text-xs font-cairo">التسوية:</Text>
                                                                    {[
                                                                        { value: 'Rolled_Over', label: 'تم الترحيل للعقد الجديد' },
                                                                        { value: 'Waived', label: 'إسقاط المبالغ / إعفاء' },
                                                                        { value: 'Settled', label: 'تمت التسوية نقدياً' },
                                                                        { value: 'Pending', label: 'معلّق (لم تتم التسوية)' }
                                                                    ].map(item => {
                                                                        const active = filterResolutions.includes(item.value);
                                                                        return (
                                                                            <antd.Tag.CheckableTag
                                                                                key={item.value}
                                                                                checked={active}
                                                                                onChange={(checked) => {
                                                                                    setFilterResolutions(checked ? [...filterResolutions, item.value] : filterResolutions.filter(r => r !== item.value));
                                                                                }}
                                                                                className={`px-3 py-1 text-xs border rounded-full transition-all duration-300 font-cairo ${active ? 'bg-primary text-white border-primary shadow-sm' : 'bg-gray-50 border-gray-200'}`}
                                                                            >
                                                                                {item.label}
                                                                            </antd.Tag.CheckableTag>
                                                                        );
                                                                    })}

                                                            )}
                                                        </Space>
                                                    </Col>

                                                {/* Submit Button */}
                                                <Row>
                                                    <Col span={24} className="text-left mt-2">
                                                        <Button type="primary" icon={<SearchOutlined />} onClick={handleGenerateReport} loading={loading} className="bg-primary hover:bg-opacity-90 font-cairo">
                                                            تحميل وتحديث بيانات التقرير 🔄
                                                        </Button>

                                        </Collapse.Panel>
                                    </Collapse>
